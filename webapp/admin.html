<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Создать игру — OZMZ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif;background:#0e1a12;color:#f5f5f0;min-height:100%;padding:24px 16px 60px;-webkit-hyphens:none;hyphens:none;overflow-y:auto;-webkit-overflow-scrolling:touch}
.card{width:100%;max-width:420px;margin:0 auto;background:#1e3024;border:1px solid rgba(126,217,87,.18);border-radius:22px;padding:22px 18px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
h1{font-size:19px;font-weight:900;text-align:center;margin-bottom:4px}
.sub{text-align:center;font-size:13px;color:#6b7c6e;margin-bottom:20px}
label{font-size:12px;color:#6b7c6e;display:block;margin-bottom:6px;margin-top:12px}
.hint{font-size:11px;color:#4a5a4d;margin-top:4px}
label:first-of-type{margin-top:0}
input,textarea{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(126,217,87,.25);background:#0e1a12;color:#f5f5f0;font-size:16px;font-family:inherit;color-scheme:dark}
input:focus,textarea:focus{outline:none;border-color:#7ed957}
textarea{resize:vertical;min-height:70px}
.row2{display:flex;gap:10px}
.row2>div{flex:1}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-weight:800;font-size:15px;cursor:pointer;background:#7ed957;color:#0e1a12;margin-top:20px;transition:transform .15s}
.btn:active{transform:scale(.97)}
.btn[disabled]{opacity:.5;pointer-events:none}
.saved{text-align:center;color:#7ed957;font-size:13px;margin-top:10px;opacity:0;transition:opacity .3s}
.saved.show{opacity:1}
.error-banner{background:rgba(255,80,80,.12);border:1px solid rgba(255,80,80,.35);color:#ff8080;font-size:13px;padding:12px 14px;border-radius:10px;line-height:1.5;text-align:center}
.manage-game{background:rgba(255,255,255,.03);border-radius:14px;padding:14px;margin-top:14px}
.manage-title{font-size:14px;font-weight:800;margin-bottom:10px}
.manage-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-top:1px solid rgba(255,255,255,.06);flex-wrap:wrap}
.manage-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.manage-msg-btn{font-size:12px;color:#7ed957;text-decoration:none;background:rgba(126,217,87,.12);padding:5px 10px;border-radius:8px;white-space:nowrap}
.manage-no-username{font-size:11px;color:#4a5a4d;white-space:nowrap}
.manage-guests{font-size:11px;color:#e0b84a;font-weight:700}
.manage-paid-claim{font-size:11px;color:#7ed957;font-weight:700}
.manage-free{color:#4a5a4d;font-style:italic}
.fix-slots-row{display:flex;gap:8px;margin-top:8px}
.fix-slots-input{flex:1;padding:9px 12px;border-radius:8px;border:1px solid rgba(126,217,87,.25);background:#0e1a12;color:#f5f5f0;font-size:14px}
.manage-move-select{font-size:11px;padding:5px 6px;border-radius:6px;border:1px solid rgba(126,217,87,.25);background:#0e1a12;color:#f5f5f0}
.manage-move-btn{padding:5px 8px;border:1px solid rgba(126,217,87,.35);background:transparent;color:#7ed957;border-radius:6px;font-size:12px;cursor:pointer}
.manage-kick-btn{padding:5px 9px;border:1px solid rgba(255,80,80,.35);background:transparent;color:#ff8080;border-radius:6px;font-size:12px;cursor:pointer}
.teams-caption{margin-top:12px;font-size:11px;color:#6b7c6e;text-transform:uppercase;letter-spacing:.5px}
.team-block{background:rgba(255,255,255,.04);border-radius:10px;padding:10px 12px;margin-top:10px}
.team-title{font-size:12px;font-weight:800;color:#7ed957;margin-bottom:6px}
.team-player{font-size:12px;padding:3px 0}
.manage-row:first-of-type{border-top:none}
.manage-name{font-size:13px}
.manage-confirm-btn{padding:6px 12px;border:none;border-radius:8px;background:#7ed957;color:#0e1a12;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.manage-confirmed-badge{font-size:12px;color:#7ed957;font-weight:700}
.manage-empty{font-size:12px;color:#4a5a4d}
.filters{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.filter-chip{flex-shrink:0;padding:8px 14px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#9db3a3;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.filter-chip.active{background:rgba(126,217,87,.15);border-color:#7ed957;color:#7ed957}
.manage-game.past{opacity:.7}
.past-badge{display:inline-block;font-size:10px;color:#6b7c6e;background:rgba(255,255,255,.06);padding:2px 8px;border-radius:6px;margin-left:8px;text-transform:uppercase;letter-spacing:.5px}
.denied{text-align:center;padding:40px 10px}
.denied .ic{font-size:40px;margin-bottom:12px}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="card">

  <div id="loading" style="text-align:center;color:#6b7c6e;font-size:13px">Проверка доступа...</div>

  <div id="denied" class="denied hidden">
    <div class="ic">🚫</div>
    <h1>Доступ запрещён</h1>
    <div class="sub">Эта страница только для админов OZMZ.</div>
  </div>

  <div id="form-wrap" class="hidden">
    <h1>⚙️ Создать игру</h1>
    <div class="sub">Анонс сразу уйдёт в группу @football_igraem_astana</div>

    <div id="error-banner"></div>

    <label>Дата</label>
    <input id="f-date" type="date">

    <label>Время</label>
    <input id="f-time" type="time">

    <label>Место</label>
    <input id="f-location" placeholder="напр. Арена Central Park">

    <div class="row2">
      <div>
        <label>Игроков всего</label>
        <input id="f-num-players" type="number" min="1" placeholder="16">
      </div>
      <div>
        <label>Команд</label>
        <input id="f-num-teams" type="number" min="1" placeholder="2">
      </div>
    </div>

    <label>Игроков в команде</label>
    <input id="f-players-per-team" type="number" min="1" placeholder="8">

    <label>Цена</label>
    <input id="f-price" placeholder="напр. 2000 тг с человека">

    <label>Ссылка на оплату</label>
    <input id="f-payment-link" placeholder="напр. Kaspi-перевод или другая ссылка">
    <div class="hint">Покажется игроку кнопкой «Оплатить» при регистрации</div>

    <label>Доп. информация</label>
    <textarea id="f-extra" placeholder="форма, парковка, что взять с собой..."></textarea>

    <button class="btn" id="submit-btn" onclick="createGame()">Создать и опубликовать</button>
    <div class="saved" id="saved-msg">✅ Игра создана и опубликована</div>
  </div>

</div>

<div class="card hidden" id="games-wrap" style="margin-top:16px">
  <h1>📋 Записи на игры</h1>
  <div class="sub">Подтверждай после получения оплаты</div>
  <div class="filters" id="games-filters"></div>
  <div id="games-manage-list"></div>
</div>

<script>
let userId = new URLSearchParams(location.search).get("uid");

if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  if (!userId) {
    const tgUser = Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user;
    if (tgUser && tgUser.id) userId = String(tgUser.id);
  }
  Telegram.WebApp.BackButton.show();
  Telegram.WebApp.BackButton.onClick(() => { location.href = "/app" + (userId ? ("?uid=" + userId) : ""); });
}

function showError(msg) {
  document.getElementById("error-banner").innerHTML = `<div class="error-banner">⚠️ ${msg}</div>`;
}

async function checkAccess() {
  if (!userId) {
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("denied").classList.remove("hidden");
    return;
  }
  try {
    const r = await fetch(`/api/is-admin?user_id=${userId}`).then(r => r.json());
    document.getElementById("loading").classList.add("hidden");
    if (r.is_admin) {
      document.getElementById("form-wrap").classList.remove("hidden");
      document.getElementById("games-wrap").classList.remove("hidden");
      loadManageGames();
    } else {
      document.getElementById("denied").classList.remove("hidden");
    }
  } catch (e) {
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("denied").classList.remove("hidden");
  }
}

async function loadManageGames() {
  try {
    const r = await fetch(`/api/admin/games?user_id=${userId}`).then(r => r.json());
    window.__allManageGames = r.games || [];
    renderGamesFilters();
    renderManageGames(filterManageGames(window.__allManageGames));
  } catch (e) {}
}

function parseGameDate(g) {
  if (!g.date || !/^\d{4}-\d{2}-\d{2}$/.test(g.date)) return null;
  const [y, m, d] = g.date.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function isPastGame(g) {
  const dt = parseGameDate(g);
  if (!dt) return false; // не можем определить — считаем актуальной
  const today = new Date(); today.setHours(0, 0, 0, 0);
  return dt < today;
}

let gamesFilter = "upcoming";

function filterManageGames(games) {
  const active = games.filter(g => g.status === "active");
  if (gamesFilter === "upcoming") return active.filter(g => !isPastGame(g));
  if (gamesFilter === "past") return active.filter(g => isPastGame(g));
  return active;
}

function renderGamesFilters() {
  const filters = [
    { id: "upcoming", label: "Ближайшие" },
    { id: "past", label: "История" },
    { id: "all", label: "Все" },
  ];
  document.getElementById("games-filters").innerHTML = filters.map(f => `
    <div class="filter-chip ${gamesFilter === f.id ? "active" : ""}" onclick="setGamesFilter('${f.id}')">${f.label}</div>
  `).join("");
}

function setGamesFilter(id) {
  gamesFilter = id;
  renderGamesFilters();
  renderManageGames(filterManageGames(window.__allManageGames || []));
}

function renderManageGames(active) {
  const el = document.getElementById("games-manage-list");
  if (active.length === 0) {
    el.innerHTML = `<div class="manage-empty">${gamesFilter === "past" ? "В истории пока пусто" : "Игр по этому фильтру нет"}</div>`;
    return;
  }
  el.innerHTML = active.map(g => {
    const past = isPastGame(g);
    const signups = g.signups || [];
    const rows = signups.length
      ? signups.map(s => {
          const label = s.player ? ` (${s.player})` : "";
          const guests = s.guests_count > 0 ? ` <span class="manage-guests">+${s.guests_count} чел.</span>` : "";
          const paidClaim = (s.payment_claimed && s.status !== "confirmed") ? ` <span class="manage-paid-claim">💰 заявил об оплате</span>` : "";
          const phoneDigits = s.phone ? s.phone.replace(/[^\d]/g, '') : '';
          const msgBtn = past ? "" : (s.username
                ? `<a class="manage-msg-btn" href="https://t.me/${s.username}" target="_blank">💬 @${s.username}</a>`
                : (phoneDigits
                    ? `<a class="manage-msg-btn" href="https://t.me/+${phoneDigits}" target="_blank">💬 ${s.phone}</a>`
                    : `<span class="manage-no-username">нет контакта</span>`));
          if (s.status === "confirmed") {
            return `<div class="manage-row">
              <span class="manage-name">${s.name}${label}${guests}</span>
              <div class="manage-actions">${msgBtn}<span class="manage-confirmed-badge">✅</span></div>
            </div>`;
          }
          const confirmBtn = past ? "" : `<button class="manage-confirm-btn" onclick="confirmPlayer(${g.id}, '${s.user_id}')">Подтвердить</button>`;
          return `<div class="manage-row">
            <span class="manage-name">${s.name}${label}${guests}${paidClaim}</span>
            <div class="manage-actions">${msgBtn}${confirmBtn}</div>
          </div>`;
        }).join("")
      : `<div class="manage-empty">Записей ещё нет</div>`;

    const numTeams = g.num_teams || 2;
    const teamsBlock = renderTeamsManage(g.id, g.teams || [], numTeams, past);

    return `<div class="manage-game ${past ? "past" : ""}">
      <div class="manage-title">📅 ${g.date} · 🕐 ${g.time} — ${g.location}${past ? '<span class="past-badge">Прошла</span>' : ""}</div>
      ${rows}
      ${teamsBlock ? `<div class="teams-caption">Составы команд${past ? "" : " (сформированы автоматически)"}</div>${teamsBlock}` : ""}
    </div>`;
  }).join("");
}

function renderTeamsManage(gameId, teamMembers, numTeams, past) {
  if (!teamMembers.length) return "";
  const byTeam = {};
  for (let i = 0; i < numTeams; i++) byTeam[i] = [];
  teamMembers.forEach(m => (byTeam[m.team_index] = byTeam[m.team_index] || []).push(m));

  return Object.keys(byTeam).map(Number).sort((a, b) => a - b).map(i => `
    <div class="team-block">
      <div class="team-title">Команда ${i + 1} (${byTeam[i].length})</div>
      ${byTeam[i].map(m => `
        <div class="manage-row">
          <span class="manage-name">${m.name}${m.player ? ` — <i>${m.player}</i>` : ""}</span>
          ${past ? "" : `<div class="manage-actions">
            <select class="manage-move-select" id="team-move-${m.id}">
              ${Array.from({length: numTeams}, (_, ti) => ti).filter(ti => ti !== i)
                .map(ti => `<option value="${ti}">→ Команда ${ti + 1}</option>`).join("")}
            </select>
            <button class="manage-move-btn" onclick="moveTeamMember(${gameId}, ${m.id})">↔</button>
          </div>`}
        </div>`).join("") || '<div class="manage-empty">пусто</div>'}
    </div>`).join("");
}

async function moveTeamMember(gameId, memberId) {
  const select = document.getElementById(`team-move-${memberId}`);
  const teamIndex = parseInt(select.value, 10);
  try {
    const res = await fetch("/api/admin/move-team-member", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId, member_id: memberId, team_index: teamIndex })
    }).then(r => r.json());
    if (res.ok) loadManageGames();
    else showError(res.error || "Не удалось переместить");
  } catch (e) {}
}

async function confirmPlayer(gameId, playerUserId) {
  try {
    const res = await fetch("/api/admin/confirm-signup", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId, game_id: gameId, player_user_id: playerUserId })
    }).then(r => r.json());
    if (res.ok) loadManageGames();
  } catch (e) {}
}

async function createGame() {
  document.getElementById("error-banner").innerHTML = "";
  const payload = {
    user_id: userId,
    date: document.getElementById("f-date").value.trim(),
    time: document.getElementById("f-time").value.trim(),
    location: document.getElementById("f-location").value.trim(),
    num_players: document.getElementById("f-num-players").value.trim(),
    num_teams: document.getElementById("f-num-teams").value.trim(),
    players_per_team: document.getElementById("f-players-per-team").value.trim(),
    price: document.getElementById("f-price").value.trim(),
    extra_info: document.getElementById("f-extra").value.trim(),
    payment_link: document.getElementById("f-payment-link").value.trim(),
  };
  if (!payload.date || !payload.time || !payload.location) {
    showError("Заполни минимум дату, время и место.");
    return;
  }

  const btn = document.getElementById("submit-btn");
  btn.setAttribute("disabled", "true");
  try {
    const res = await fetch("/api/admin/create-game", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    }).then(r => r.json());

    if (!res.ok) {
      showError(res.error || "Не удалось создать игру.");
    } else {
      const saved = document.getElementById("saved-msg");
      saved.classList.add("show");
      ["f-date","f-time","f-location","f-num-players","f-num-teams","f-players-per-team","f-price","f-payment-link","f-extra"]
        .forEach(id => document.getElementById(id).value = "");
      setTimeout(() => saved.classList.remove("show"), 2500);
      loadManageGames();
    }
  } catch (e) {
    showError("Ошибка сети — попробуй ещё раз.");
  }
  btn.removeAttribute("disabled");
}

checkAccess();
</script>
</body>
</html>
