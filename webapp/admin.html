<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Создать игру — OZMZ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif;background:#0e1a12;color:#f5f5f0;min-height:100%;padding:24px 16px 60px;-webkit-hyphens:none;hyphens:none;overflow-y:auto;-webkit-overflow-scrolling:touch}
.card{width:100%;max-width:420px;margin:0 auto;background:#1e3024;border:1px solid rgba(126,217,87,.18);border-radius:22px;padding:22px 18px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
h1{font-size:19px;font-weight:900;text-align:center;margin-bottom:4px}
.sub{text-align:center;font-size:13px;color:#6b7c6e;margin-bottom:20px}
label{font-size:12px;color:#6b7c6e;display:block;margin-bottom:6px;margin-top:12px}
label:first-of-type{margin-top:0}
input,textarea{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(126,217,87,.25);background:#0e1a12;color:#f5f5f0;font-size:16px;font-family:inherit}
input:focus,textarea:focus{outline:none;border-color:#7ed957}
textarea{resize:vertical;min-height:70px}
.row2{display:flex;gap:10px}
.row2>div{flex:1}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-weight:800;font-size:15px;cursor:pointer;background:#7ed957;color:#0e1a12;margin-top:20px;transition:transform .15s}
.btn:active{transform:scale(.97)}
.btn[disabled]{opacity:.5;pointer-events:none}
.saved{text-align:center;color:#7ed957;font-size:13px;margin-top:10px;opacity:0;transition:opacity .3s}
.saved.show{opacity:1}
.error-banner{background:rgba(255,80,80,.12);border:1px solid rgba(255,80,80,.35);color:#ff8080;font-size:13px;padding:12px 14px;border-radius:10px;line-height:1.5;text-align:center}
.denied{text-align:center;padding:40px 10px}
.denied .ic{font-size:40px;margin-bottom:12px}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="card">

  <div id="loading" style="text-align:center;color:#6b7c6e;font-size:13px">Проверка доступа...</div>

  <div id="denied" class="denied hidden">
    <div class="ic">🚫</div>
    <h1>Доступ запрещён</h1>
    <div class="sub">Эта страница только для админов OZMZ.</div>
  </div>

  <div id="form-wrap" class="hidden">
    <h1>⚙️ Создать игру</h1>
    <div class="sub">Анонс сразу уйдёт в группу @football_igraem_astana</div>

    <div id="error-banner"></div>

    <label>Дата</label>
    <input id="f-date" placeholder="напр. 12.07.2026">

    <label>Время</label>
    <input id="f-time" placeholder="напр. 20:00">

    <label>Место</label>
    <input id="f-location" placeholder="напр. Арена Central Park">

    <div class="row2">
      <div>
        <label>Игроков всего</label>
        <input id="f-num-players" type="number" min="1" placeholder="16">
      </div>
      <div>
        <label>Команд</label>
        <input id="f-num-teams" type="number" min="1" placeholder="2">
      </div>
    </div>

    <label>Игроков в команде</label>
    <input id="f-players-per-team" type="number" min="1" placeholder="8">

    <label>Цена</label>
    <input id="f-price" placeholder="напр. 2000 тг с человека">

    <label>Доп. информация</label>
    <textarea id="f-extra" placeholder="форма, парковка, что взять с собой..."></textarea>

    <button class="btn" id="submit-btn" onclick="createGame()">Создать и опубликовать</button>
    <div class="saved" id="saved-msg">✅ Игра создана и опубликована</div>
  </div>

</div>

<script>
let userId = new URLSearchParams(location.search).get("uid");

if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

function showError(msg) {
  document.getElementById("error-banner").innerHTML = `<div class="error-banner">⚠️ ${msg}</div>`;
}

async function checkAccess() {
  if (!userId) {
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("denied").classList.remove("hidden");
    return;
  }
  try {
    const r = await fetch(`/api/is-admin?user_id=${userId}`).then(r => r.json());
    document.getElementById("loading").classList.add("hidden");
    if (r.is_admin) {
      document.getElementById("form-wrap").classList.remove("hidden");
    } else {
      document.getElementById("denied").classList.remove("hidden");
    }
  } catch (e) {
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("denied").classList.remove("hidden");
  }
}

async function createGame() {
  document.getElementById("error-banner").innerHTML = "";
  const payload = {
    user_id: userId,
    date: document.getElementById("f-date").value.trim(),
    time: document.getElementById("f-time").value.trim(),
    location: document.getElementById("f-location").value.trim(),
    num_players: document.getElementById("f-num-players").value.trim(),
    num_teams: document.getElementById("f-num-teams").value.trim(),
    players_per_team: document.getElementById("f-players-per-team").value.trim(),
    price: document.getElementById("f-price").value.trim(),
    extra_info: document.getElementById("f-extra").value.trim(),
  };
  if (!payload.date || !payload.time || !payload.location) {
    showError("Заполни минимум дату, время и место.");
    return;
  }

  const btn = document.getElementById("submit-btn");
  btn.setAttribute("disabled", "true");
  try {
    const res = await fetch("/api/admin/create-game", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    }).then(r => r.json());

    if (!res.ok) {
      showError(res.error || "Не удалось создать игру.");
    } else {
      const saved = document.getElementById("saved-msg");
      saved.classList.add("show");
      ["f-date","f-time","f-location","f-num-players","f-num-teams","f-players-per-team","f-price","f-extra"]
        .forEach(id => document.getElementById(id).value = "");
      setTimeout(() => saved.classList.remove("show"), 2500);
    }
  } catch (e) {
    showError("Ошибка сети — попробуй ещё раз.");
  }
  btn.removeAttribute("disabled");
}

checkAccess();
</script>
</body>
</html>
