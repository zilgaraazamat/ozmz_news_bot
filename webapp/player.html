<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Профиль игрока — OZMZ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif;background:#0B0D10;color:#F5F6F7;min-height:100%;padding:24px 16px calc(40px + env(safe-area-inset-bottom));-webkit-hyphens:none;hyphens:none;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(600px circle at 50% -10%, rgba(94,106,210,.10), transparent 60%)}
.wrap{width:100%;max-width:400px;margin:0 auto;position:relative;z-index:1}
.hidden{display:none!important}

.top-bar{display:flex;align-items:center;margin-bottom:18px}
.back-link{display:flex;align-items:center;gap:6px;color:#9BA1AC;font-size:13px;font-weight:600;cursor:pointer}
.back-link:active{opacity:.7}

.pf-hero{position:relative;overflow:hidden;background:linear-gradient(160deg,#1B1E26 0%,#14151A 65%,#101116 100%);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:28px 20px 22px;margin-bottom:20px;box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 20px 46px rgba(0,0,0,.45);text-align:center;opacity:0;animation:reveal-up .4s ease forwards}
@keyframes reveal-up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.pf-hero::before{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent 35%,rgba(255,255,255,.05) 48%,transparent 62%);pointer-events:none}
.pf-hero::after{content:'';position:absolute;top:-40%;right:-20%;width:70%;height:70%;background:radial-gradient(circle,rgba(94,106,210,.18),transparent 70%);pointer-events:none}

.pf-avatar-wrap{position:relative;z-index:1;width:104px;height:104px;margin:0 auto 14px}
.pf-gauge{width:100%;height:100%;transform:rotate(-90deg)}
.pf-gauge-track{fill:none;stroke:rgba(255,255,255,.08);stroke-width:6}
.pf-gauge-fill{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)}
.pf-avatar{position:absolute;inset:10px;border-radius:50%;background:#23262D;border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-family:'Oswald',-apple-system,sans-serif;font-size:32px;font-weight:700;color:#F5F6F7}
.pf-ovr-chip{position:relative;z-index:1;display:inline-flex;align-items:center;gap:5px;background:rgba(94,106,210,.14);border:1px solid rgba(94,106,210,.3);border-radius:100px;padding:4px 12px;font-family:'Oswald',-apple-system,sans-serif;font-size:12px;font-weight:600;color:#8B93F5;margin-bottom:10px}

.pf-name{position:relative;z-index:1;font-family:'Oswald',-apple-system,sans-serif;font-size:22px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px}
.pf-role{position:relative;z-index:1;display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:#9BA1AC;background:rgba(255,255,255,.04);border-radius:100px;padding:5px 12px}
.pf-role b{color:#F5F6F7;font-weight:700}

.pf-edit-btn{position:relative;z-index:1;display:inline-flex;align-items:center;gap:6px;margin-top:16px;padding:10px 18px;border-radius:12px;background:#5E6AD2;color:#fff;font-family:'Oswald',-apple-system,sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;cursor:pointer;box-shadow:0 4px 14px rgba(94,106,210,.3)}
.pf-edit-btn:active{transform:scale(.97)}

.stats-grid{display:flex;gap:10px;margin-bottom:20px}
.stat-tile{flex:1;background:#181A1F;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:14px 8px;text-align:center;opacity:0;animation:reveal-up .4s ease forwards}
.stat-tile:nth-child(1){animation-delay:.05s}
.stat-tile:nth-child(2){animation-delay:.1s}
.stat-tile:nth-child(3){animation-delay:.15s}
.stat-num{font-family:'Oswald',-apple-system,sans-serif;font-size:22px;font-weight:700;color:#F5F6F7;font-variant-numeric:tabular-nums;line-height:1.1}
.stat-num.soon{font-size:13px;color:#565A61}
.stat-label{font-size:10.5px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.4px;margin-top:4px}

.section-label{font-family:'Oswald',-apple-system,sans-serif;font-size:13px;font-weight:600;color:#E5E6E8;margin:4px 0 12px;text-transform:uppercase;letter-spacing:.8px}

.matches-card{background:#181A1F;border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:6px 16px;box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 12px 30px rgba(0,0,0,.35);opacity:0;animation:reveal-up .4s ease .2s forwards}
.match-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.match-row:last-child{border-bottom:none}
.match-icon{width:32px;height:32px;border-radius:9px;background:#23262D;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.match-info{flex:1;min-width:0}
.match-loc{font-size:13px;font-weight:600;color:#F5F6F7;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.match-date{font-size:11.5px;color:#6B7280;margin-top:1px}
.match-empty{text-align:center;color:#6B7280;font-size:13px;padding:26px 10px}

.loading{text-align:center;color:#6B7280;font-size:13px;padding:60px 10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <div class="back-link" onclick="goBack()">‹ Назад</div>
  </div>

  <div id="content">
    <div class="loading">Загрузка профиля...</div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
let targetId = params.get("uid");
let myId = params.get("me");

if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  if (!myId) {
    const tgUser = Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user;
    if (tgUser && tgUser.id) myId = String(tgUser.id);
  }
  Telegram.WebApp.BackButton.show();
  Telegram.WebApp.BackButton.onClick(goBack);
}

function goBack() {
  location.href = "/app" + (myId ? ("?uid=" + myId) : "");
}

// Свайп вправо от левого края — тоже работает как "назад"
(function () {
  let startX = null, startY = null;
  document.addEventListener("touchstart", e => {
    const t = e.touches[0];
    if (t.clientX < 24) { startX = t.clientX; startY = t.clientY; }
  }, { passive: true });
  document.addEventListener("touchend", e => {
    if (startX === null) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = Math.abs(t.clientY - startY);
    if (dx > 70 && dy < 60) goBack();
    startX = null;
  }, { passive: true });
})();

function avatarLetter(name) {
  return ((name || "?").trim().charAt(0) || "?").toUpperCase();
}

function localeCode() {
  const tw = window.Telegram && Telegram.WebApp;
  const tgLang = tw && tw.initDataUnsafe && tw.initDataUnsafe.user && tw.initDataUnsafe.user.language_code;
  return tgLang || navigator.language || "ru";
}

function capitalize(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
}

// Дата матча всегда показывается с днём недели, отформатированным под язык
// пользователя — не только число, чтобы сразу было видно, на какой день игра.
function formatMatchDate(dateStr) {
  if (!dateStr || !/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr || "";
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  const loc = localeCode();
  const weekday = capitalize(new Intl.DateTimeFormat(loc, { weekday: "short" }).format(dt));
  const dayMonth = new Intl.DateTimeFormat(loc, { day: "numeric", month: "short" }).format(dt).replace(/\.$/, "");
  return `${weekday}, ${dayMonth}`;
}

function renderProfile(p) {
  const isMine = myId && String(myId) === String(p.user_id);
  const r = 54;
  const circumference = 2 * Math.PI * r;
  const pct = Math.max(0, Math.min(1, (p.ovr || 0) / 99));

  const matchesHtml = (p.recent_matches && p.recent_matches.length)
    ? p.recent_matches.map(m => `
        <div class="match-row">
          <div class="match-icon">⚽</div>
          <div class="match-info">
            <div class="match-loc">${m.location || "Матч"}</div>
            <div class="match-date">${formatMatchDate(m.date)}${m.time ? " · " + m.time : ""}</div>
          </div>
        </div>`).join("")
    : `<div class="match-empty">Пока нет сыгранных матчей</div>`;

  document.getElementById("content").innerHTML = `
    <div class="pf-hero">
      <div class="pf-avatar-wrap">
        <svg class="pf-gauge" viewBox="0 0 120 120">
          <defs>
            <linearGradient id="pfGaugeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#8B93F5"/>
              <stop offset="100%" stop-color="#5E6AD2"/>
            </linearGradient>
          </defs>
          <circle class="pf-gauge-track" cx="60" cy="60" r="${r}"></circle>
          <circle class="pf-gauge-fill" cx="60" cy="60" r="${r}" stroke="url(#pfGaugeGrad)"
            stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}"></circle>
        </svg>
        <div class="pf-avatar">${avatarLetter(p.name)}</div>
      </div>
      <div class="pf-ovr-chip">⚡ ${p.ovr} OVR</div>
      <div class="pf-name">${p.name}</div>
      ${p.role && p.role.player ? `<div class="pf-role">🏆 <b>${p.role.player}</b></div>` : ""}
      ${isMine ? `<div class="pf-edit-btn" onclick="location.href='/app?tab=profile'+(myId?('&uid='+myId):'')">✏️ Редактировать профиль</div>` : ""}
    </div>

    <div class="stats-grid">
      <div class="stat-tile">
        <div class="stat-num">${p.games_played}</div>
        <div class="stat-label">Игр сыграно</div>
      </div>
      <div class="stat-tile">
        <div class="stat-num ${p.mvp_implemented ? "" : "soon"}">${p.mvp_implemented ? (p.mvp_count || 0) : "Скоро"}</div>
        <div class="stat-label">MVP</div>
      </div>
      <div class="stat-tile">
        <div class="stat-num ${p.achievements_implemented ? "" : "soon"}">${p.achievements_implemented ? (p.achievements_count || 0) : "Скоро"}</div>
        <div class="stat-label">Награды</div>
      </div>
    </div>

    <div class="section-label">📅 Последние матчи</div>
    <div class="matches-card">${matchesHtml}</div>
  `;

  requestAnimationFrame(() => {
    setTimeout(() => {
      const fillEl = document.querySelector(".pf-gauge-fill");
      if (fillEl) fillEl.style.strokeDashoffset = `${circumference * (1 - pct)}`;
    }, 300);
  });
}

async function loadProfile() {
  if (!targetId) {
    document.getElementById("content").innerHTML = `<div class="loading">Не удалось определить игрока.</div>`;
    return;
  }
  try {
    const r = await fetch(`/api/player-profile?user_id=${encodeURIComponent(targetId)}`).then(r => r.json());
    if (r.error) {
      document.getElementById("content").innerHTML = `<div class="loading">Профиль не найден.</div>`;
      return;
    }
    renderProfile(r);
  } catch (e) {
    document.getElementById("content").innerHTML = `<div class="loading">Не удалось загрузить профиль. Попробуй ещё раз.</div>`;
  }
}

loadProfile();
</script>
</body>
</html>
