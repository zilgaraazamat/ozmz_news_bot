<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Профиль — OZMZ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif;background:#0e1a12;color:#f5f5f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;-webkit-hyphens:none;hyphens:none}
.card{width:100%;max-width:400px;background:#1e3024;border:1px solid rgba(126,217,87,.18);border-radius:22px;padding:22px 18px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.avatar{width:72px;height:72px;border-radius:50%;background:rgba(126,217,87,.12);border:2px solid #7ed957;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 14px}
h1{font-size:19px;font-weight:900;text-align:center;margin-bottom:4px}
.sub{text-align:center;font-size:13px;color:#6b7c6e;margin-bottom:20px}
.role-badge{display:flex;align-items:center;gap:10px;background:rgba(126,217,87,.08);border:1px solid rgba(126,217,87,.25);border-radius:12px;padding:12px 14px;margin-bottom:18px}
.role-badge .ic{font-size:22px}
.role-badge .txt div:first-child{font-size:11px;color:#6b7c6e;text-transform:uppercase;letter-spacing:.5px}
.role-badge .txt div:last-child{font-size:14px;font-weight:800;color:#7ed957}
label{font-size:12px;color:#6b7c6e;display:block;margin-bottom:6px}
input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(126,217,87,.25);background:#0e1a12;color:#f5f5f0;font-size:15px;margin-bottom:6px}
input:focus{outline:none;border-color:#7ed957}
.hint{font-size:11px;color:#4a5a4d;margin-bottom:16px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-weight:800;font-size:15px;cursor:pointer;background:#7ed957;color:#0e1a12;transition:transform .15s}
.btn:active{transform:scale(.97)}
.btn[disabled]{opacity:.5;pointer-events:none}
.saved{text-align:center;color:#7ed957;font-size:13px;margin-top:10px;opacity:0;transition:opacity .3s}
.saved.show{opacity:1}
.no-role{text-align:center;font-size:13px;color:#6b7c6e;padding:12px;background:rgba(255,255,255,.03);border-radius:10px;margin-bottom:18px}
</style>
</head>
<body>
<div class="card">
  <div class="avatar">👤</div>
  <h1 id="display-name">Профиль</h1>
  <div class="sub">Ник виден другим в батлах и постах команды</div>

  <div id="role-block"></div>

  <label for="nick-input">Твой ник</label>
  <input id="nick-input" placeholder="Как тебя называть?" maxlength="24">
  <div class="hint">До 24 символов. Виден в батлах и итогах теста.</div>

  <button class="btn" id="save-btn" onclick="saveNick()">Сохранить</button>
  <div class="saved" id="saved-msg">✅ Сохранено</div>
</div>

<script>
let userId = null;

if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  Telegram.WebApp.BackButton.show();
  Telegram.WebApp.BackButton.onClick(() => { location.href = "/app"; });
  const tgUser = Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user;
  if (tgUser) userId = String(tgUser.id);
}

async function loadProfile() {
  if (!userId) {
    document.getElementById("display-name").textContent = "Открой через бота";
    document.getElementById("sub") && (document.getElementById("sub").textContent = "");
    document.getElementById("save-btn").setAttribute("disabled", "true");
    return;
  }
  const r = await fetch(`/api/profile?user_id=${userId}`).then(r => r.json());
  document.getElementById("display-name").textContent = r.nickname || r.name || "Профиль";
  document.getElementById("nick-input").value = r.nickname || "";
  document.getElementById("nick-input").placeholder = r.name ? `Например, ${r.name}` : "Как тебя называть?";

  const roleBlock = document.getElementById("role-block");
  if (r.role) {
    roleBlock.innerHTML = `
      <div class="role-badge">
        <div class="ic">🏆</div>
        <div class="txt">
          <div>Твой футболист</div>
          <div>${r.role.player} · ${r.role.category}</div>
        </div>
      </div>`;
  } else {
    roleBlock.innerHTML = `<div class="no-role">Ещё не проходил тест «Кто ты из футболистов?»</div>`;
  }
}

async function saveNick() {
  const nickname = document.getElementById("nick-input").value.trim();
  if (!nickname || !userId) return;
  const btn = document.getElementById("save-btn");
  btn.setAttribute("disabled", "true");
  await fetch("/api/profile", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ user_id: userId, nickname })
  });
  btn.removeAttribute("disabled");
  document.getElementById("display-name").textContent = nickname;
  const saved = document.getElementById("saved-msg");
  saved.classList.add("show");
  setTimeout(() => saved.classList.remove("show"), 1800);
}

loadProfile();
</script>
</body>
</html>
