<html lang="ru">
<head>
<meta charset="UTF-8">

<title>Кто ты из футболистов? — OZMZ Football</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif;background:#0e1a12;color:#f5f5f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent 0,transparent 55px,rgba(126,217,87,.025) 55px,rgba(126,217,87,.025) 110px);pointer-events:none;z-index:0}
.card{position:relative;z-index:1;background:#1e3024;border:1px solid rgba(126,217,87,.18);border-radius:22px;width:100%;max-width:420px;padding:24px 20px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
#s-start{display:block}#s-quiz,#s-res{display:none}
.logo-wrap{text-align:center;margin-bottom:14px}
.logo-wrap img{width:76px;height:76px;border-radius:50%;object-fit:cover;border:2.5px solid #7ed957;box-shadow:0 0 20px rgba(126,217,87,.3);animation:bob 2.5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.badge{display:inline-block;background:#7ed957;color:#0e1a12;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:8px}
.start-title{font-weight:900;font-size:clamp(28px,7vw,40px);line-height:1.05;letter-spacing:-.5px;margin-bottom:10px}
.start-title span{color:#7ed957}
.org-badge{display:flex;align-items:center;gap:8px;background:rgba(126,217,87,.07);border:1px solid rgba(126,217,87,.2);border-radius:10px;padding:10px 12px;margin-bottom:12px}
.org-icon{font-size:20px;flex-shrink:0}
.org-text{font-size:12px;color:rgba(245,245,240,.75);line-height:1.4}
.org-text b{color:#7ed957;display:block;font-size:13px;margin-bottom:1px}
.sub{color:#6b7c6e;font-size:13px;line-height:1.5;margin-bottom:18px}
.btn-start{width:100%;padding:15px;background:#7ed957;color:#0e1a12;border:none;border-radius:12px;font-weight:800;font-size:16px;cursor:pointer;transition:transform .15s,box-shadow .15s}
.btn-start:active{transform:scale(.97)}
.btn-start:hover{box-shadow:0 6px 20px rgba(126,217,87,.35)}
.pbar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-bottom:16px;overflow:hidden}
.pfill{height:100%;background:#7ed957;border-radius:2px;transition:width .4s}
.qnum{font-size:11px;color:#6b7c6e;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
.qtext{font-size:16px;font-weight:700;line-height:1.35;margin-bottom:16px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{padding:12px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:10px;color:#f5f5f0;font-size:14px;font-weight:500;cursor:pointer;text-align:left;transition:all .15s}
.opt:active,.opt:hover{background:rgba(126,217,87,.12);border-color:#7ed957;color:#7ed957}
.opt.sel{background:#7ed957;border-color:#7ed957;color:#0e1a12;font-weight:700}
.loader{display:none;text-align:center;padding:28px 0}
.spin{width:36px;height:36px;border:3px solid rgba(126,217,87,.15);border-top-color:#7ed957;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{color:#6b7c6e;font-size:13px}
.res-player{text-align:center;margin-bottom:16px}
.res-photo{width:100px;height:100px;border-radius:50%;object-fit:cover;object-position:top;border:3px solid #7ed957;box-shadow:0 0 24px rgba(126,217,87,.4);margin:0 auto 10px;display:block}
.res-label{font-size:10px;color:#6b7c6e;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.res-name{font-weight:900;font-size:clamp(24px,6vw,34px);color:#7ed957;line-height:1.05;margin-bottom:0}
.res-desc{font-size:13px;line-height:1.65;color:rgba(245,245,240,.85);background:rgba(255,255,255,.04);border-left:3px solid #7ed957;padding:11px 13px;border-radius:0 10px 10px 0;margin-bottom:14px}
.btns{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.btn-tg{padding:12px;background:#229ED9;color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer}
.btn-wa{padding:12px;background:#25D366;color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer}
.btn-retry{padding:10px;background:transparent;color:#6b7c6e;border:1px solid rgba(255,255,255,.1);border-radius:11px;font-size:13px;cursor:pointer}
.insta-wrap{border-radius:14px;overflow:hidden;margin-bottom:8px}
.insta-top{background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);padding:14px;text-align:center}
.i-title{font-size:14px;font-weight:800;color:#fff;margin-bottom:6px}
.i-org{font-size:11px;color:rgba(255,255,255,.85);background:rgba(0,0,0,.2);border-radius:8px;padding:7px 10px;margin-bottom:10px;line-height:1.5}
.i-handle{display:block;background:rgba(255,255,255,.2);border:2px dashed rgba(255,255,255,.7);border-radius:10px;padding:10px;font-size:17px;font-weight:900;color:#fff;cursor:pointer;transition:background .15s;margin-bottom:4px;user-select:all}
.i-handle:active{background:rgba(255,255,255,.35)}
.i-hint{font-size:10px;color:rgba(255,255,255,.6)}
.share-note{text-align:center;font-size:11px;color:#6b7c6e;margin-top:6px}
</style>
</head>
