<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Кто ты из футболистов? — OZMZ Football</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif;background:#0e1a12;color:#f5f5f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent 0,transparent 55px,rgba(126,217,87,.025) 55px,rgba(126,217,87,.025) 110px);pointer-events:none;z-index:0}
.card{position:relative;z-index:1;background:#1e3024;border:1px solid rgba(126,217,87,.18);border-radius:22px;width:100%;max-width:420px;padding:24px 20px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.logo-container{text-align:center;margin-bottom:16px}
.logo{font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:3px;color:#7ed957;background:rgba(126,217,87,.1);padding:6px 14px;border-radius:30px;display:inline-block}

/* Исправленный заголовок: убрали дефисы, добавили красивый перенос */
.title{font-size:26px;font-weight:800;text-align:center;line-height:1.2;margin-bottom:24px;color:#fff}
.title span { white-space: nowrap; } /* Запрещает разрывать слово "футболистов" */

.btn{display:block;width:100%;background:#7ed957;color:#0e1a12;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;transition:transform 0.1s,background 0.2s;text-align:center;text-decoration:none}
.btn:active{transform:scale(.98)}
.btn-secondary{background:rgba(245,245,240,.08);color:#f5f5f0;margin-top:10px}
.q-box{display:none}
.q-num{font-size:13px;font-weight:700;color:#7ed957;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.q-txt{font-size:19px;font-weight:700;line-height:1.4;margin-bottom:20px}
.answers{display:flex;flex-direction:column;gap:10px}
.ans-btn{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:#e1e1d7;border-radius:14px;padding:14px 16px;font-size:15px;text-align:left;cursor:pointer;transition:all .2s;font-weight:500;line-height:1.3}
.ans-btn:active,.ans-btn.selected{background:rgba(126,217,87,.12);border-color:#7ed957;color:#fff}
.progress-bar{height:4px;background:rgba(255,255,255,.05);border-radius:2px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:#7ed957;width:0%;transition:width .3s ease}

/* Стили для адаптивного и красивого фото футболиста в результатах */
.res-photo-wrapper { width: 100%; height: 240px; border-radius: 14px; overflow: hidden; margin-bottom: 16px; background: rgba(0,0,0,0.2); border: 1px solid rgba(126,217,87,.2); }
.res-img{width:100%;height:100%;object-fit:cover;display:block}

.res-name{font-size:24px;font-weight:800;color:#7ed957;text-align:center;margin-bottom:12px}
.res-desc{font-size:15px;line-height:1.5;color:#d1d1c7;text-align:center;margin-bottom:24px}
.share-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(245,245,240,.4);text-align:center;margin-bottom:12px}
.share-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>
<body>
<div class="card">
  <div class="logo-container"><span class="logo">OZMZ Football</span></div>
  
  <div id="s-start">
    <h1 class="title">Кто ты из <span>футболистов?</span></h1>
    <button class="btn" onclick="startQuiz()">Начать тест</button>
  </div>
  
  <div id="s-quiz" style="display:none">
    <div class="progress-bar"><div id="p-fill" class="progress-fill"></div></div>
    <div id="q-container"></div>
  </div>
  
  <div id="s-res" style="display:none">
    <h2 class="title">Твой результат</h2>
    <div class="res-photo-wrapper">
        <img id="res-photo" class="res-img" src="" alt="Футболист">
    </div>
    <div id="res-name" class="res-name"></div>
    <div id="res-desc" class="res-desc"></div>
    <p class="share-title">Поделиться результатом</p>
    <div class="share-grid">
      <button class="btn" style="background:#22a5e4;color:#fff" onclick="shareTG()">Telegram</button>
      <button class="btn" style="background:#25d366;color:#fff" onclick="shareWA()">WhatsApp</button>
    </div>
    <button class="btn btn-secondary" onclick="location.reload()">Пройти еще раз</button>
  </div>
</div>

<script>
const Q = [
  {q:"Твоя главная сильная сторона на поле?",a:["Идеальный дриблинг и скорость","Феноменальное голевое чутье","Дисциплина и упорные тренировки","Видение поля и точные пасы","Лидерство и железная оборона","Непредсказуемость и магия в ногах"]},
  {q:"Как ты реагируешь на критику в прессе?",a:["Просто молча делаю свою работу","Отвечаю голами на поле","Меня это мотивирует работать еще усерднее","Не обращаю внимания, фокус на игре","Защищаю команду, беру удар на себя","Перевожу все в шутку или игнорирую"]},
  {q:"Твой идеальный отпуск — это...",a:["В кругу семьи на тихой вилле","В Дубае или на модном курорте","В родном городе с близкими","На яхте в океане","Активный отдых или тренировки","Шумные вечеринки и карнавалы"]},
  {q:"Какую роль ты обычно выбираешь в компании?",a:["Тихий гений, говорящий делами","Яркий лидер, который всегда на виду","Главный трудяга и мотиватор","Мозг компании, стратег","Защитник и надежное плечо","Главный весельчак и душа компании"]},
  {q:"Твой любимый игровой номер?",a:["10","7","9","8","4","11"]},
  {q:"Что для тебя важнее всего в футболе?",a:["Эстетика и удовольствие от игры","Победы и трофеи","Постоянное самосовершенствование","Командная химия и тактика","Надежность и характер","Шоу и эмоции болельщиков"]},
  {q:"Если твоя команда проигрывает к перерыву...",a:["Буду искать нестандартное решение на поле","Заведу команду своей уверенностью","Включу максимум прессинга и агрессии","Спокойно оценю тактические ошибки","Устрою разнос в раздевалке как капитан","Постараюсь вернуть всем позитивный настрой"]},
  {q:"Твой стиль одежды вне поля?",a:["Простой, спортивный или классический","Дорогой, брендовый, безупречный","Строгий, лаконичный","Элегантный кэжуал","Главное — удобство","Яркий, эпатажный, необычный"]},
  {q:"В каком чемпионате ты мечтаешь играть?",a:["Ла Лига (Испания)","АПЛ (Англия)","Серия А (Италия)","Бундеслига (Германия)","Лига 1 (Франция)","Везде, где любят красивый футбол"]},
  {q:"Что ты сделаешь после завершения карьеры?",a:["Уйду в тень, буду жить ради семьи","Стану мировым брендом и бизнесменом","Буду поддерживать форму и путешествовать","Перехожу в тренеры","Открываю футбольную академию","Буду наслаждаться жизнью на полную"]}
];

// В базу данных PL добавлены рабочие фото игроков из открытых источников
const PL = [
  {n:"Лионель Месси", e:"🐐", d:"Ты — прирожденный гений. Тебе не нужно кричать, чтобы тебя заметили, за тебя говорит твоя магия на поле и невероятное видение игры.", p:"https://images.unsplash.com/photo-1518063319789-7217e6706b04?w=500&auto=format&fit=crop&q=60"},
  {n:"Криштиану Роналду", e:"🔥", d:"Ты — пример невероятной ментальности и атлетизма. Твой девиз: «Работа превосходит талант». Ты всегда стремишься быть первым во всем.", p:"https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=500&auto=format&fit=crop&q=60"},
  {n:"Килиан Мбаппе", e:"⚡", d:"Ты — скорость, дерзость и будущее футбола. Ты уверен в себе, не боишься брать ответственность в ключевые моменты и уничтожаешь оборону соперника.", p:"https://images.unsplash.com/photo-1543351611-58f69d7c1781?w=500&auto=format&fit=crop&q=60"},
  {n:"Кевин Де Брюйне", e:"🎯", d:"Ты — мозг команды. Видишь то, чего не видят другие, и способен отдать идеальную передачу в любой ситуации. Интеллект — твое главное оружие.", p:"https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?w=500&auto=format&fit=crop&q=60"},
  {n:"Эрлинг Холанд", e:"🤖", d:"Ты — машина для забивания голов. Обладаешь сумасшедшей мощью и голевым чутьем. Если перед тобой ворота — гол неизбежен.", p:"https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=500&auto=format&fit=crop&q=60"},
  {n:"Неймар", e:"🇧🇷", d:"Ты — творец и любитель красивой игры. Футбол для тебя — это танец и праздник. Ты обожаешь финты и приносишь радость трибунам.", p:"https://images.unsplash.com/photo-1560272564-c83b66b1ad12?w=500&auto=format&fit=crop&q=60"},
  {n:"Златан Ибрагимович", e:"🦁", d:"Ты — лев. Твоя уверенность граничит с величием. Ты не подстраиваешься под мир, мир подстраивается под тебя. Забиваешь только шедевры.", p:"https://images.unsplash.com/photo-1504151932400-72d4384f04b3?w=500&auto=format&fit=crop&q=60"},
  {n:"Лука Модрич", e:"👑", d:"Ты — вечная классика и трудолюбие. Твоя элегантность на поле завораживает. Возраст для тебя — всего лишь цифра.", p:"https://images.unsplash.com/photo-1517649763962-0c623066013b?w=500&auto=format&fit=crop&q=60"},
  {n:"Вирджил ван Дейк", e:"🧱", d:"Ты — скала и надежность. Твое спокойствие передается всей команде. Пройти тебя один в один — практически невыполнимая задача.", p:"https://images.unsplash.com/photo-1551958219-acbc608c6d77?w=500&auto=format&fit=crop&q=60"},
  {n:"Джуд Беллингем", e:"🌟", d:"Ты — юная звезда с менталитетом ветерана. Обладаешь универсализмом, зрелостью и умением оказываться в нужном месте в нужное время.", p:"https://images.unsplash.com/photo-1579952365545-36dd9e602ee2?w=500&auto=format&fit=crop&q=60"}
];

let cur=0, ans=[];
function startQuiz(){
  document.getElementById('s-start').style.display='none';
  document.getElementById('s-quiz').style.display='block';
  showQ();
}
function showQ(){
  if(cur>=Q.length){ calcRes(); return; }
  document.getElementById('p-fill').style.width=`${(cur/Q.length)*100}%`;
  let html=`<div class="q-num">Вопрос ${cur+1} из ${Q.length}</div><div class="q-txt">${Q[cur].q}</div><div class="answers">`;
  Q[cur].a.forEach((a,i)=>{ html+=`<button class="ans-btn" onclick="next(${i})">${a}</button>`; });
  html+='</div>';
  document.getElementById('q-container').innerHTML=html;
}
function next(i){
  ans.push(Q[cur].a[i]);
  cur++;
  showQ();
}
function calcRes(){
  let sc=Array(PL.length).fill(0);
  if(ans[0]==="Идеальный дриблинг и скорость"){sc[0]+=3;sc[2]+=2;sc[5]+=3;}
  if(ans[0]==="Феноменальное голевое чутье"){sc[1]+=2;sc[4]+=3;sc[6]+=2;}
  if(ans[0]==="Дисциплина и упорные тренировки"){sc[1]+=3;sc[8]+=2;}
  if(ans[0]==="Видение поля и точные пасы"){sc[3]+=3;sc[7]+=3;}
  if(ans[0]==="Лидерство и железная оборона"){sc[8]+=3;sc[6]+=1;}
  if(ans[0]==="Непредсказуемость и магия в ногах"){sc[0]+=2;sc[5]+=3;sc[9]+=1;}

  if(ans[1]==="Просто молча делаю свою работу"){sc[0]+=2;sc[3]+=2;sc[7]+=2;}
  if(ans[1]==="Отвечаю голами на поле"){sc[1]+=2;sc[4]+=3;sc[9]+=2;}
  if(ans[1]==="Меня это мотивирует работать еще усерднее"){sc[1]+=3;sc[8]+=2;}
  if(ans[1]==="Защищаю команду, беру удар на себя"){sc[6]+=3;sc[8]+=2;}

  if(ans[4]==="10"){sc[0]+=3;sc[5]+=2;sc[7]+=1;}
  if(ans[4]==="7"){sc[1]+=3;sc[2]+=2;sc[9]+=1;}
  if(ans[4]==="9"){sc[4]+=3;sc[6]+=2;}
  if(ans[4]==="8"){sc[3]+=3;}
  if(ans[4]==="4"){sc[8]+=3;}
  if(ans[4]==="11"){sc[5]+=2;sc[2]+=1;}

  if(ans[9]==="Перехожу в тренеры"){sc[3]+=2;sc[7]+=2;}
  if(ans[9]==="Открываю футбольную академию"){sc[0]+=2;sc[8]+=1;}
  
  sc.forEach((_,i)=>{sc[i]+=Math.random()*1.2;});
  const p=PL[sc.indexOf(Math.max(...sc))];
  
  document.getElementById('s-quiz').style.display='none';
  document.getElementById('s-res').style.display='block';
  
  const photo=document.getElementById('res-photo');
  photo.src=p.p;
  photo.alt=p.n;
  photo.style.display='block'; // Показываем фото
  
  photo.onerror=()=>{photo.style.display='none';};
  document.getElementById('res-name').textContent=p.n;
  document.getElementById('res-desc').textContent=p.d;
  window._p=p;
}
function shareTG(){
  const p=window._p||{};
  window.open(`https://t.me/share/url?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent('⚽ Прошёл тест!\n🏆 Я — '+p.n+'! '+p.e+'\n\n'+p.d+'\n\nПройди сам 👇')}`);
}
function shareWA(){
  const p=window._p||{};
  window.open(`https://wa.me/?text=${encodeURIComponent('⚽ Прошёл тест "Кто ты из футболистов?"\n🏆 Я — '+p.n+'! '+p.e+'\n\nПройди сам: '+location.href)}`);
}
</script>
</body>
</html>
