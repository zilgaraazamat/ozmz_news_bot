<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>OZMZ Football</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif;background:#0B0D10;color:#F5F6F7;min-height:100%;padding:24px 16px calc(96px + env(safe-area-inset-bottom));-webkit-hyphens:none;hyphens:none;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(600px circle at 50% -10%, rgba(94,106,210,.10), transparent 60%)}
.disp{font-family:'Oswald',-apple-system,sans-serif}
.wrap{width:100%;max-width:400px;margin:0 auto;position:relative;z-index:1}
.hidden{display:none!important}

/* ── меню ── */
.head{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding:14px 14px 14px 10px;background:linear-gradient(120deg,rgba(255,255,255,.045),rgba(255,255,255,.01) 60%);border:1px solid rgba(255,255,255,.07);border-radius:20px;position:relative;overflow:hidden}
.logo{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid #5E6AD2;box-shadow:0 0 18px rgba(94,106,210,.35);flex-shrink:0}
.head-txt{flex:1;min-width:0;text-align:left}
.head h1{font-family:'Oswald',-apple-system,sans-serif;font-size:17px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;line-height:1.15}
.head p{font-size:11.5px;color:#6B7280;margin-top:4px;display:flex;align-items:center;gap:6px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#30D158;flex-shrink:0;box-shadow:0 0 0 0 rgba(48,209,88,.6);animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%{box-shadow:0 0 0 0 rgba(48,209,88,.55)}70%{box-shadow:0 0 0 7px rgba(48,209,88,0)}100%{box-shadow:0 0 0 0 rgba(48,209,88,0)}}

/* ── quick actions: компактные квадратные кнопки в ряд ── */
.quick-actions{display:flex;gap:12px;margin-bottom:22px}
.qa-btn{flex:1;aspect-ratio:1/1;max-height:84px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;border-radius:18px;cursor:pointer;transition:transform .12s;opacity:0;animation:card-in .35s ease forwards;box-shadow:0 6px 16px rgba(0,0,0,.3)}
.quick-actions .qa-btn:nth-child(1){animation-delay:.02s}
.quick-actions .qa-btn:nth-child(2){animation-delay:.06s}
.quick-actions .qa-btn:nth-child(3){animation-delay:.1s}
@keyframes card-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.qa-btn:active{transform:scale(.93)}
.qa-amber{background:linear-gradient(150deg,rgba(224,184,74,.16),#181A1F 70%);border:1px solid rgba(224,184,74,.26)}
.qa-blue{background:linear-gradient(150deg,rgba(94,180,255,.16),#181A1F 70%);border:1px solid rgba(94,180,255,.26)}
.qa-purple{background:linear-gradient(150deg,rgba(94,106,210,.2),#181A1F 70%);border:1px solid rgba(94,106,210,.3)}
.qa-icon{font-size:23px}
.qa-label{font-family:'Oswald',-apple-system,sans-serif;font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:#F5F6F7}

.footer{text-align:center;margin-top:16px;font-size:11px;color:#565A61}

/* ── нижняя навигация: фиксирована, одна и та же на всех экранах ── */
.bottom-nav{position:fixed;left:0;right:0;bottom:0;display:flex;background:rgba(11,13,16,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,.07);z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;height:56px;cursor:pointer;color:#565A61;transition:color .15s;-webkit-tap-highlight-color:transparent}
.bn-item .bn-icon{font-size:20px;line-height:1}
.bn-item .bn-label{font-family:'Oswald',-apple-system,sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.bn-item.active{color:#8B93F5}
.bn-item:active{opacity:.7}

/* ── лента новостей: главный акцент экрана ── */
.section-label{display:flex;align-items:center;gap:10px;font-family:'Oswald',-apple-system,sans-serif;font-size:14px;font-weight:600;color:#E5E6E8;margin:4px 0 16px;text-transform:uppercase;letter-spacing:1px}
.section-label::after{content:'';flex:1;height:1px;background:repeating-linear-gradient(90deg,rgba(94,106,210,.35) 0,rgba(94,106,210,.35) 5px,transparent 5px,transparent 10px)}
.news-list{display:flex;flex-direction:column;gap:18px}
.news-item{
  position:relative;
  background:#181A1F;
  border:1px solid rgba(255,255,255,.06);
  border-radius:22px;
  overflow:hidden;
  cursor:pointer;
  opacity:0;
  transform:translateY(10px);
  animation:news-in .4s ease forwards;
  transition:transform .28s cubic-bezier(.2,.8,.2,1), box-shadow .28s cubic-bezier(.2,.8,.2,1), border-color .28s;
  box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 14px 34px rgba(0,0,0,.38), 0 2px 8px rgba(0,0,0,.25);
}
@keyframes news-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.news-list .news-item:nth-child(1){animation-delay:.02s}
.news-list .news-item:nth-child(2){animation-delay:.06s}
.news-list .news-item:nth-child(3){animation-delay:.1s}
.news-list .news-item:nth-child(4){animation-delay:.14s}
.news-list .news-item:nth-child(5){animation-delay:.18s}
@media (hover:hover){
  .news-item:hover{transform:translateY(-4px);box-shadow:0 1px 0 rgba(255,255,255,.05) inset, 0 22px 44px rgba(0,0,0,.45), 0 4px 12px rgba(0,0,0,.3);border-color:rgba(94,106,210,.3)}
  .news-item:hover .ni-photo{transform:scale(1.04)}
}
.news-item:active{transform:scale(.975) translateY(0);box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 8px 18px rgba(0,0,0,.32)}
.news-item .ni-photo-wrap{position:relative;width:100%;height:190px;overflow:hidden;background:#14161B}
.news-item .ni-photo{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease}
.news-item .ni-photo-fade{position:absolute;left:0;right:0;bottom:0;height:56px;background:linear-gradient(180deg,rgba(24,26,31,0),#181A1F);pointer-events:none}
.news-item .ni-badge-overlay{position:absolute;top:12px;left:12px;z-index:2}
.news-item .ni-body{padding:16px 18px 20px}
.ni-badge{display:inline-flex;align-items:center;justify-content:center;text-align:center;width:38px;min-height:46px;padding:4px 3px;font-family:'Oswald',-apple-system,sans-serif;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.2px;line-height:1.15;white-space:normal;border-radius:5px;position:relative;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);box-shadow:0 3px 8px rgba(0,0,0,.35)}
.ni-badge::after{content:'';position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.5}
.ni-badge.b-anons{color:#04213d;background:linear-gradient(155deg,#7ECAFF,#5EB4FF)}
.ni-badge.b-turnir{color:#2a1c00;background:linear-gradient(155deg,#FFC24B,#DBA22E)}
.ni-badge.b-novosti{color:#04302E;background:linear-gradient(155deg,#7FE3E0,#4FC7C2)}
.ni-badge.b-vazhno{color:#2a0505;background:linear-gradient(155deg,#FF8A80,#FF6961)}
.ni-badge.b-drugoe{color:#1a1c20;background:linear-gradient(155deg,#C6CAD1,#9BA1AC)}
.news-item .ni-title{font-family:'Oswald',-apple-system,sans-serif;font-size:19px;font-weight:600;margin:12px 0 7px;line-height:1.22;letter-spacing:.1px}
.news-item .ni-text{font-size:13.5px;color:#9BA1AC;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-item .ni-date{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;color:#6B7280;margin-top:12px}
.news-empty{text-align:center;padding:40px 16px;color:#6B7280;font-size:13px}

/* ── модальное окно полной статьи ── */
.news-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;backdrop-filter:blur(4px)}
.news-modal-card{width:100%;max-height:88vh;overflow-y:auto;background:#14161B;border-radius:24px 24px 0 0;position:relative;padding-bottom:calc(24px + env(safe-area-inset-bottom));animation:modal-up .25s ease}
@keyframes modal-up{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.news-modal-close{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;border:none;font-size:15px;cursor:pointer;z-index:2}
.news-modal-card .nm-photo{width:100%;height:230px;object-fit:cover;display:block}
.news-modal-card .nm-body{padding:20px 20px 4px}
.news-modal-card .nm-title{font-family:'Oswald',-apple-system,sans-serif;font-size:21px;font-weight:600;margin:12px 0 9px;line-height:1.22;letter-spacing:.1px}
.news-modal-card .nm-text{font-size:14px;color:#D7D9DC;line-height:1.65;white-space:pre-wrap}
.news-modal-card .nm-date{font-size:12px;color:#6B7280;margin-top:14px}


/* ── профиль ── */
.card{width:100%;background:#181A1F;border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:22px 18px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.avatar{width:72px;height:72px;border-radius:50%;background:rgba(94,106,210,.14);border:2px solid #5E6AD2;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 14px}
.card h1{font-family:'Oswald',-apple-system,sans-serif;font-size:21px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;text-align:center;margin-bottom:4px}
.sub{text-align:center;font-size:13px;color:#6B7280;margin-bottom:20px}
.role-badge{display:flex;align-items:center;gap:10px;background:rgba(94,106,210,.1);border:1px solid rgba(94,106,210,.28);border-radius:12px;padding:12px 14px;margin-bottom:18px}
.stats-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border-radius:12px;padding:12px 14px;margin-bottom:18px}
.stats-ic{font-size:22px}
.stats-num{font-size:18px;font-weight:900;color:#8B93F5}
.stats-label{font-size:11px;color:#6B7280;text-transform:uppercase;letter-spacing:.5px}
.role-badge .ic{font-size:22px}
.role-badge .txt div:first-child{font-size:11px;color:#6B7280;text-transform:uppercase;letter-spacing:.5px}
.role-badge .txt div:last-child{font-size:14px;font-weight:800;color:#8B93F5}
.retake-link{text-align:center;font-size:12px;color:#6B7280;margin:-10px 0 18px;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.retake-link:active{color:#8B93F5}
label{font-size:12px;color:#6B7280;display:block;margin-bottom:6px}
input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:#23262D;color:#F5F6F7;font-size:16px;margin-bottom:6px}
input:focus{outline:none;border-color:#5E6AD2}
.hint{font-size:11px;color:#565A61;margin-bottom:16px}
.btn{width:100%;padding:14px;border:none;border-radius:14px;font-family:'Oswald',-apple-system,sans-serif;font-weight:600;font-size:15px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;background:#5E6AD2;color:#fff;transition:transform .15s,background .15s;box-shadow:0 4px 14px rgba(94,106,210,.3)}
.btn:active{transform:scale(.97);background:#525DC4}
.btn[disabled]{opacity:.5;pointer-events:none}
.saved{text-align:center;color:#30D158;font-size:13px;margin-top:10px;opacity:0;transition:opacity .3s}
.saved.show{opacity:1}
.no-role{text-align:center;font-size:13px;color:#6B7280;padding:12px;background:rgba(255,255,255,.03);border-radius:10px;margin-bottom:18px}
.error-banner{background:rgba(255,69,58,.12);border:1px solid rgba(255,69,58,.3);color:#FF6961;font-size:12px;padding:10px 12px;border-radius:10px;margin-bottom:16px;line-height:1.4}
.nick-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.nick-display{flex:1;min-width:0;background:#23262D;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px;font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nick-edit-btn{flex-shrink:0;width:42px;height:42px;border-radius:10px;background:#23262D;border:1px solid rgba(255,255,255,.08);color:#8B93F5;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nick-edit-btn:active{background:rgba(94,106,210,.14)}
.btn-outline{background:transparent;border:1px solid rgba(94,106,210,.4);color:#8B93F5}
.cta-card{background:linear-gradient(135deg,rgba(94,106,210,.14),rgba(94,106,210,.04));border:1px solid rgba(94,106,210,.3);border-radius:14px;padding:16px;margin-bottom:18px;text-align:center;cursor:pointer;transition:transform .15s}
.cta-card:active{transform:scale(.97)}
.cta-card .ic{font-size:28px;margin-bottom:8px}
.cta-card .title{font-size:14px;font-weight:800;margin-bottom:4px}
.cta-card .sub2{font-size:12px;color:#9BA1AC}
</style>
</head>
<body>
<div class="wrap">

  <!-- ЭКРАН: меню -->
  <div id="screen-menu">
    <div class="head">
      <img class="logo" src="/logo.jpg" alt="OZMZ">
      <div class="head-txt">
        <h1>OZMZ Football Astana</h1>
        <p><span class="live-dot"></span>Играем — будь в курсе всего</p>
      </div>
    </div>

    <div class="quick-actions" id="quick-actions">
      <div class="qa-btn qa-amber" onclick="go('/battle')">
        <div class="qa-icon">⚔️</div>
        <div class="qa-label">Battle</div>
      </div>
      <div class="qa-btn qa-blue" onclick="go('/scanner')">
        <div class="qa-icon">📷</div>
        <div class="qa-label">Scanner</div>
      </div>
      <div class="qa-btn qa-purple hidden" id="admin-qa" onclick="go('/admin')">
        <div class="qa-icon">⚙️</div>
        <div class="qa-label">Игра+</div>
      </div>
    </div>

    <div id="news-feed"></div>

    <div class="footer">@football_igraem_astana</div>
  </div>

  <!-- ЭКРАН: профиль (та же страница, без перехода) -->
  <div id="screen-profile" class="hidden">
    <div class="card">
      <div class="avatar">👤</div>
      <h1 id="display-name">Профиль</h1>
      <div class="sub" id="profile-sub">Ник виден другим в батлах и постах команды</div>

      <div id="error-banner"></div>
      <div id="role-block"></div>
      <div id="stats-block"></div>

      <!-- режим просмотра -->
      <div id="view-mode">
        <label>Твой ник</label>
        <div class="nick-row">
          <div class="nick-display" id="nick-display">—</div>
          <button class="nick-edit-btn" onclick="enterEditMode()" title="Редактировать ник">✏️</button>
        </div>
      </div>

      <!-- режим редактирования -->
      <div id="edit-mode" class="hidden">
        <label for="nick-input">Твой ник</label>
        <input id="nick-input" placeholder="Как тебя называть?" maxlength="24">
        <div class="hint">До 24 символов. Виден в батлах и итогах теста.</div>
        <button class="btn" id="save-btn" onclick="saveNick()">Сохранить</button>
        <button class="btn btn-outline" id="cancel-btn" onclick="cancelEdit()">Отмена</button>
      </div>

      <div class="saved" id="saved-msg">✅ Сохранено</div>
    </div>
  </div>

</div>

<div class="news-modal hidden" id="news-modal" onclick="closeNewsModalOutside(event)">
  <div class="news-modal-card">
    <button class="news-modal-close" onclick="closeNewsModal()">✕</button>
    <div id="news-modal-body"></div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="bn-item" data-tab="home" onclick="bnGo('home')">
    <div class="bn-icon">🏠</div>
    <div class="bn-label">Home</div>
  </div>
  <div class="bn-item" data-tab="games" onclick="bnGo('games')">
    <div class="bn-icon">⚽</div>
    <div class="bn-label">Игры</div>
  </div>
  <div class="bn-item" data-tab="profile" onclick="bnGo('profile')">
    <div class="bn-icon">👤</div>
    <div class="bn-label">Профиль</div>
  </div>
</nav>

<script>
let userId = new URLSearchParams(location.search).get("uid");

if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  Telegram.WebApp.BackButton.hide();
  // Резервный источник ID — если ссылка открыта не через свежую персональную кнопку
  if (!userId) {
    const tgUser = Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user;
    if (tgUser && tgUser.id) userId = String(tgUser.id);
  }
}

function go(path) {
  location.href = path + (userId ? ("?uid=" + userId) : "");
}

(async function checkAdmin() {
  if (!userId) return;
  try {
    const r = await fetch(`/api/is-admin?user_id=${userId}`).then(r => r.json());
    if (r.is_admin) document.getElementById("admin-qa").classList.remove("hidden");
  } catch (e) {}
})();

function formatNewsDate(iso, eventDate) {
  const src = eventDate || (iso ? iso.split(" ")[0] : "");
  const [y, m, d] = (src || "").split("-");
  const months = ["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"];
  if (!y || !m || !d) return "";
  return `${parseInt(d, 10)} ${months[parseInt(m, 10) - 1] || ""}`;
}

function badgeClass(category) {
  const map = { "Анонс": "b-anons", "Турнир": "b-turnir", "Новости": "b-novosti", "Важно": "b-vazhno", "Другое": "b-drugoe" };
  return map[category] || "b-drugoe";
}

let newsCache = [];

async function loadNews() {
  try {
    const r = await fetch("/api/announcements").then(r => r.json());
    newsCache = r.announcements || [];
    const feed = document.getElementById("news-feed");
    if (newsCache.length === 0) {
      feed.innerHTML = `
        <div class="section-label">📰 Новости</div>
        <div class="news-empty">Пока новостей нет — загляни позже ⚽</div>`;
      return;
    }
    feed.innerHTML = `
      <div class="section-label">📰 Новости</div>
      <div class="news-list">${newsCache.map((a, i) => `
        <div class="news-item" onclick="openNewsModal(${i})">
          ${a.image ? `
          <div class="ni-photo-wrap">
            <img class="ni-photo" src="data:image/jpeg;base64,${a.image}">
            <div class="ni-photo-fade"></div>
            <span class="ni-badge ${badgeClass(a.category)} ni-badge-overlay">${a.category || "Другое"}</span>
          </div>` : ""}
          <div class="ni-body">
            ${!a.image ? `<span class="ni-badge ${badgeClass(a.category)}">${a.category || "Другое"}</span>` : ""}
            <div class="ni-title">${a.title}</div>
            <div class="ni-text">${a.text}</div>
            <div class="ni-date">🗓 ${formatNewsDate(a.created_at, a.event_date)}</div>
          </div>
        </div>`).join("")}</div>`;
  } catch (e) {}
}
loadNews();

function openNewsModal(i) {
  const a = newsCache[i];
  if (!a) return;
  document.getElementById("news-modal-body").innerHTML = `
    ${a.image ? `<img class="nm-photo" src="data:image/jpeg;base64,${a.image}">` : ""}
    <div class="nm-body">
      <span class="ni-badge ${badgeClass(a.category)}">${a.category || "Другое"}</span>
      <div class="nm-title">${a.title}</div>
      <div class="nm-text">${a.text}</div>
      <div class="nm-date">🗓 ${formatNewsDate(a.created_at, a.event_date)}</div>
    </div>`;
  document.getElementById("news-modal").classList.remove("hidden");
}

function closeNewsModal() {
  document.getElementById("news-modal").classList.add("hidden");
}

function closeNewsModalOutside(e) {
  if (e.target.id === "news-modal") closeNewsModal();
}

function setActiveTab(tab) {
  document.querySelectorAll(".bn-item").forEach(el => {
    el.classList.toggle("active", el.dataset.tab === tab);
  });
}

function bnGo(tab) {
  if (tab === "home") showMenu();
  else if (tab === "profile") showProfile();
  else if (tab === "games") go("/games");
}

function showMenu() {
  document.getElementById("screen-profile").classList.add("hidden");
  document.getElementById("screen-menu").classList.remove("hidden");
  setActiveTab("home");
  if (window.Telegram && Telegram.WebApp) Telegram.WebApp.BackButton.hide();
}

function showProfile() {
  document.getElementById("screen-menu").classList.add("hidden");
  document.getElementById("screen-profile").classList.remove("hidden");
  setActiveTab("profile");
  if (window.Telegram && Telegram.WebApp) {
    Telegram.WebApp.BackButton.show();
    Telegram.WebApp.BackButton.onClick(showMenu);
  }
  loadProfile();
}

// если пришли с другой страницы через вкладку "Профиль" нижней навигации
if (new URLSearchParams(location.search).get("tab") === "profile") {
  showProfile();
} else {
  setActiveTab("home");
}

function showError(msg) {
  document.getElementById("error-banner").innerHTML = `<div class="error-banner">⚠️ ${msg}</div>`;
}

function showView() {
  document.getElementById("view-mode").classList.remove("hidden");
  document.getElementById("edit-mode").classList.add("hidden");
}

function showEdit() {
  document.getElementById("view-mode").classList.add("hidden");
  document.getElementById("edit-mode").classList.remove("hidden");
}

function enterEditMode() {
  document.getElementById("error-banner").innerHTML = "";
  showEdit();
  document.getElementById("nick-input").focus();
}

function cancelEdit() {
  document.getElementById("error-banner").innerHTML = "";
  // возвращаем инпут к сохранённому значению
  document.getElementById("nick-input").value = window.__currentNickname || "";
  showView();
}

async function loadProfile() {
  document.getElementById("error-banner").innerHTML = "";
  if (!userId) {
    document.getElementById("display-name").textContent = "Не определён пользователь";
    showError("Не удалось получить Telegram ID. Полностью закрой мини-приложение и открой заново через кнопку в чате с ботом.");
    return;
  }
  try {
    const r = await fetch(`/api/profile?user_id=${userId}`).then(r => r.json());
    window.__currentNickname = r.nickname || "";

    document.getElementById("nick-input").value = r.nickname || "";
    document.getElementById("nick-input").placeholder = r.name ? `Например, ${r.name}` : "Как тебя называть?";

    const roleBlock = document.getElementById("role-block");
    if (r.role) {
      document.getElementById("profile-sub").textContent = "Ник виден другим в батлах и постах команды";
      roleBlock.innerHTML = `
        <div class="role-badge">
          <div class="ic">🏆</div>
          <div class="txt">
            <div>Ты — футболист</div>
            <div>${r.role.player} · ${r.role.category}</div>
          </div>
        </div>
        <div class="retake-link" onclick="go('/quiz')">🔄 Пройти тест заново</div>`;
    } else {
      roleBlock.innerHTML = `
        <div class="cta-card" onclick="go('/quiz')">
          <div class="ic">⚽</div>
          <div class="title">Пройди тест и узнай,</div>
          <div class="title">кто ты из легенд футбола!</div>
          <div class="sub2">Займёт меньше минуты →</div>
        </div>`;
    }

    const statsBlock = document.getElementById("stats-block");
    const played = r.games_played || 0;
    statsBlock.innerHTML = `
      <div class="stats-row">
        <div class="stats-ic">🎮</div>
        <div class="stats-txt">
          <div class="stats-num">${played}</div>
          <div class="stats-label">${played === 1 ? "игра сыграна" : "игр сыграно"}</div>
        </div>
      </div>`;

    if (r.nickname) {
      document.getElementById("display-name").textContent = r.nickname;
      document.getElementById("nick-display").textContent = r.nickname;
      document.getElementById("cancel-btn").classList.remove("hidden");
      showView();
    } else {
      document.getElementById("display-name").textContent = r.name || "Профиль";
      document.getElementById("nick-display").textContent = "Ещё не задан";
      document.getElementById("cancel-btn").classList.add("hidden");
      showEdit();
    }
  } catch (e) {
    showError("Не удалось загрузить профиль. Попробуй ещё раз.");
  }
}

async function saveNick() {
  const nickname = document.getElementById("nick-input").value.trim();
  if (!userId) { showError("Нет Telegram ID."); return; }
  if (!nickname) { showError("Введи ник перед сохранением."); return; }

  const btn = document.getElementById("save-btn");
  btn.setAttribute("disabled", "true");
  try {
    const res = await fetch("/api/profile", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId, nickname })
    }).then(r => r.json());

    if (!res.ok) {
      showError("Сервер не сохранил ник: " + (res.error || "неизвестная ошибка"));
    } else {
      document.getElementById("error-banner").innerHTML = "";
      document.getElementById("display-name").textContent = nickname;
      document.getElementById("nick-display").textContent = nickname;
      window.__currentNickname = nickname;
      showView();
      const saved = document.getElementById("saved-msg");
      saved.classList.add("show");
      setTimeout(() => saved.classList.remove("show"), 1800);
    }
  } catch (e) {
    showError("Не получилось сохранить — проверь соединение.");
  }
  btn.removeAttribute("disabled");
}
</script>
</body>
