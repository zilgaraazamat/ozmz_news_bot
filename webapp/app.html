<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>OZMZ Football</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif;background:#0e1a12;color:#f5f5f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;-webkit-hyphens:none;hyphens:none}
.wrap{width:100%;max-width:400px}
.head{text-align:center;margin-bottom:22px}
.logo{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid #7ed957;margin-bottom:12px;box-shadow:0 0 24px rgba(126,217,87,.35)}
.head h1{font-size:20px;font-weight:900}
.head p{font-size:13px;color:#6b7c6e;margin-top:4px}
.menu-card{display:flex;align-items:center;gap:14px;background:#1e3024;border:1px solid rgba(126,217,87,.18);border-radius:18px;padding:16px;margin-bottom:12px;cursor:pointer;transition:transform .15s,border-color .15s}
.menu-card:active{transform:scale(.97);border-color:#7ed957}
.menu-icon{width:48px;height:48px;border-radius:12px;background:rgba(126,217,87,.12);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.menu-text h2{font-size:15px;font-weight:800;margin-bottom:2px}
.menu-text p{font-size:12px;color:#6b7c6e;line-height:1.4}
.menu-arrow{margin-left:auto;color:#7ed957;font-size:18px}
.footer{text-align:center;margin-top:18px;font-size:11px;color:#4a5a4d}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <img class="logo" src="/logo.jpg" alt="OZMZ">
    <h1>OZMZ Football Astana</h1>
    <p>Выбери, что хочешь сделать</p>
  </div>

  <div class="menu-card" onclick="go('/quiz')">
    <div class="menu-icon">🎮</div>
    <div class="menu-text">
      <h2>Кто ты из футболистов?</h2>
      <p>Пройди тест из 10 вопросов</p>
    </div>
    <div class="menu-arrow">→</div>
  </div>

  <div class="menu-card" onclick="go('/battle')">
    <div class="menu-icon">⚔️</div>
    <div class="menu-text">
      <h2>Батл с другом</h2>
      <p>Проверьте знание футбола 1×1</p>
    </div>
    <div class="menu-arrow">→</div>
  </div>

  <div class="menu-card" onclick="go('/profile')">
    <div class="menu-icon">👤</div>
    <div class="menu-text">
      <h2>Профиль</h2>
      <p>Сохрани ник, посмотри свою роль</p>
    </div>
    <div class="menu-arrow">→</div>
  </div>

  <div class="footer">@football_igraem_astana</div>
</div>

<script>
if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  Telegram.WebApp.BackButton.hide();
}
function go(path) {
  location.href = path;
}
</script>
</body>
</html>
