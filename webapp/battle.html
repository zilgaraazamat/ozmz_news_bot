<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Футбольный батл — OZMZ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif;background:#0e1a12;color:#f5f5f0;min-height:100%;padding:24px 16px 60px;-webkit-hyphens:none;hyphens:none;overflow-y:auto;-webkit-overflow-scrolling:touch}
.wrap{width:100%;max-width:440px;margin:0 auto}
.hidden{display:none!important}

.head{text-align:center;margin-bottom:18px}
.head h1{font-size:20px;font-weight:900}
.head p{font-size:13px;color:#6b7c6e;margin-top:4px}

.card{background:#1e3024;border:1px solid rgba(126,217,87,.18);border-radius:18px;padding:18px;margin-bottom:16px}
label{font-size:12px;color:#6b7c6e;display:block;margin-bottom:6px}
input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(126,217,87,.25);background:#0e1a12;color:#f5f5f0;font-size:16px;margin-bottom:12px}
input:focus{outline:none;border-color:#7ed957}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-weight:800;font-size:15px;cursor:pointer;background:#7ed957;color:#0e1a12;transition:transform .15s}
.btn:active{transform:scale(.97)}
.btn[disabled]{opacity:.5;pointer-events:none}
.btn-outline{background:transparent;border:1px solid rgba(126,217,87,.4);color:#7ed957}

.list-title{font-size:13px;color:#6b7c6e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.lobby-row{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.03);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.lobby-info{flex:1;min-width:0}
.lobby-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lobby-sub{font-size:12px;color:#6b7c6e}
.lobby-join{padding:8px 14px;border:none;border-radius:9px;background:#7ed957;color:#0e1a12;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
.empty{text-align:center;color:#6b7c6e;font-size:13px;padding:20px 10px}
.error-banner{background:rgba(255,80,80,.12);border:1px solid rgba(255,80,80,.35);color:#ff8080;font-size:12px;padding:10px 12px;border-radius:10px;margin-bottom:12px;text-align:center}

.spin{width:30px;height:30px;border:3px solid rgba(126,217,87,.15);border-top-color:#7ed957;border-radius:50%;animation:spin .8s linear infinite;margin:16px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.waiting-title{text-align:center;font-size:17px;font-weight:800;margin-bottom:6px}
.waiting-sub{text-align:center;font-size:13px;color:#6b7c6e}

.scoreboard{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.04);border-radius:12px;padding:12px 14px;margin-bottom:16px}
.sc-player{text-align:center;flex:1;min-width:0}
.sc-name{font-size:12px;color:#6b7c6e;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-score{font-size:22px;font-weight:900;color:#7ed957}
.sc-vs{font-size:12px;color:#6b7c6e;padding:0 8px}
.qnum{font-size:11px;color:#6b7c6e;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.qtext{font-size:17px;font-weight:700;line-height:1.35;margin-bottom:16px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{padding:12px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:10px;color:#f5f5f0;font-size:14px;font-weight:600;cursor:pointer;text-align:left}
.opt:active{background:rgba(126,217,87,.12);border-color:#7ed957}
.opt.correct{background:#7ed957;border-color:#7ed957;color:#0e1a12}
.opt.wrong{background:rgba(255,80,80,.2);border-color:#ff5050}
.opt[disabled]{pointer-events:none}
.waiting-msg{text-align:center;color:#6b7c6e;font-size:13px;margin-top:14px}

.result-title{text-align:center;font-size:20px;font-weight:900;margin-bottom:14px}
.result-row{display:flex;justify-content:space-between;padding:10px 14px;background:rgba(255,255,255,.04);border-radius:10px;margin-bottom:8px;font-size:14px}
.result-row.win{background:rgba(126,217,87,.15);border:1px solid #7ed957}
</style>
</head>
<body>
<div class="wrap">

  <!-- ЭКРАН: лобби -->
  <div id="s-lobby">
    <div class="head">
      <h1>⚔️ Футбольный батл</h1>
      <p>Создай свой или зайди в чужой — играют первые двое</p>
    </div>

    <div id="error-banner"></div>

    <div class="card">
      <label for="title-input">Название баттла</label>
      <input id="title-input" placeholder="напр. Кто круче знает футбол?" maxlength="40">
      <button class="btn" id="create-btn" onclick="createBattle()">Создать баттл</button>
    </div>

    <div class="list-title">Открытые баттлы</div>
    <div id="lobby-list"></div>
  </div>

  <!-- ЭКРАН: ожидание соперника -->
  <div id="s-waiting" class="hidden">
    <div class="card">
      <div class="waiting-title" id="waiting-title">Баттл создан</div>
      <div class="waiting-sub">Кто угодно может зайти и сыграть с тобой</div>
      <div class="spin"></div>
      <div class="waiting-msg">Ждём соперника...</div>
    </div>
  </div>

  <!-- ЭКРАН: игра -->
  <div id="s-game" class="hidden">
    <div class="card">
      <div class="scoreboard">
        <div class="sc-player"><div class="sc-name">Ты</div><div class="sc-score" id="me-score">0</div></div>
        <div class="sc-vs">VS</div>
        <div class="sc-player"><div class="sc-name" id="opp-name">Соперник</div><div class="sc-score" id="opp-score">0</div></div>
      </div>
      <div class="qnum" id="qnum">Вопрос 1/10</div>
      <div class="qtext" id="qtext">...</div>
      <div class="opts" id="opts"></div>
      <div class="waiting-msg hidden" id="wait-opp">✅ Ответ принят. Ждём соперника...</div>
    </div>
  </div>

  <!-- ЭКРАН: итоги -->
  <div id="s-result" class="hidden">
    <div class="card">
      <div class="result-title" id="result-title">🏆 Батл завершён</div>
      <div id="result-rows"></div>
      <button class="btn btn-outline" onclick="location.href='/battle'+(userId?('?uid='+userId):'')">Назад в лобби</button>
    </div>
  </div>

</div>

<script>
let userId = new URLSearchParams(location.search).get("uid");
let battleId = null;
let pollTimer = null;
let renderedStep = -1;
let answeredThisStep = false;

if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  Telegram.WebApp.BackButton.show();
  Telegram.WebApp.BackButton.onClick(() => { location.href = "/app" + (userId ? ("?uid=" + userId) : ""); });
}

function showError(msg) {
  document.getElementById("error-banner").innerHTML = `<div class="error-banner">⚠️ ${msg}</div>`;
}

function showScreen(id) {
  ["lobby", "waiting", "game", "result"].forEach(s =>
    document.getElementById("s-" + s).classList.toggle("hidden", s !== id));
}

async function loadLobby() {
  try {
    const r = await fetch("/api/battle/list").then(r => r.json());
    renderLobby(r.battles || []);
  } catch (e) {}
}

function renderLobby(battles) {
  const el = document.getElementById("lobby-list");
  if (!battles.length) {
    el.innerHTML = `<div class="empty">Открытых баттлов нет — создай первый! ⚽</div>`;
    return;
  }
  el.innerHTML = battles.map(b => `
    <div class="lobby-row">
      <div class="lobby-info">
        <div class="lobby-title">${b.title}</div>
        <div class="lobby-sub">создал ${b.creator_name}</div>
      </div>
      <button class="lobby-join" onclick="joinBattle('${b.id}')">Играть</button>
    </div>`).join("");
}

async function createBattle() {
  if (!userId) { showError("Не удалось определить тебя. Открой заново через бота."); return; }
  const title = document.getElementById("title-input").value.trim();
  const btn = document.getElementById("create-btn");
  btn.setAttribute("disabled", "true");
  try {
    const r = await fetch("/api/battle/create", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId, title })
    }).then(r => r.json());
    if (!r.battle_id) { showError("Не удалось создать баттл."); btn.removeAttribute("disabled"); return; }
    battleId = r.battle_id;
    document.getElementById("waiting-title").textContent = title || "Баттл создан";
    showScreen("waiting");
    startPolling();
  } catch (e) {
    showError("Ошибка сети — попробуй ещё раз.");
  }
  btn.removeAttribute("disabled");
}

async function joinBattle(id) {
  if (!userId) { showError("Не удалось определить тебя. Открой заново через бота."); return; }
  try {
    const r = await fetch("/api/battle/join", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId, battle_id: id })
    }).then(r => r.json());
    if (r.error === "not_found") { showError("Этот баттл уже недоступен."); loadLobby(); return; }
    if (r.error === "full") { showError("В этом баттле уже два игрока."); loadLobby(); return; }
    battleId = id;
    renderedStep = -1;
    showScreen("game");
    startPolling();
  } catch (e) {
    showError("Ошибка сети — попробуй ещё раз.");
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  poll();
  pollTimer = setInterval(poll, 1500);
}

async function poll() {
  if (!battleId || !userId) return;
  const r = await fetch(`/api/battle/state?battle_id=${battleId}&user_id=${userId}`).then(r => r.json());
  if (!r || r.error) return;

  if (r.waiting) { showScreen("waiting"); return; }

  document.getElementById("opp-name").textContent = r.opponent_name || "Соперник";

  if (r.finished) {
    clearInterval(pollTimer);
    renderResult(r);
    return;
  }

  const me = r.scores.find(s => s.is_me);
  const opp = r.scores.find(s => !s.is_me);
  document.getElementById("me-score").textContent = me ? me.score : 0;
  document.getElementById("opp-score").textContent = opp ? opp.score : 0;

  showScreen("game");

  if (r.you_answered) {
    document.getElementById("wait-opp").classList.remove("hidden");
    return;
  }
  document.getElementById("wait-opp").classList.add("hidden");

  if (renderedStep !== r.step) {
    renderedStep = r.step;
    answeredThisStep = false;
    renderQuestion(r);
  }
}

function renderQuestion(r) {
  document.getElementById("qnum").textContent = `Вопрос ${r.step + 1}/${r.total}`;
  document.getElementById("qtext").textContent = r.question.text;
  const optsEl = document.getElementById("opts");
  optsEl.innerHTML = "";
  r.question.options.forEach(opt => {
    const div = document.createElement("div");
    div.className = "opt";
    div.textContent = opt;
    div.onclick = () => answer(opt, div);
    optsEl.appendChild(div);
  });
}

async function answer(text, el) {
  if (answeredThisStep) return;
  answeredThisStep = true;
  document.querySelectorAll(".opt").forEach(o => o.setAttribute("disabled", "true"));

  const r = await fetch("/api/battle/answer", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ battle_id: battleId, user_id: userId, answer: text })
  }).then(r => r.json());

  if (r) {
    el.classList.add(r.correct ? "correct" : "wrong");
    if (!r.correct) {
      document.querySelectorAll(".opt").forEach(o => {
        if (o.textContent === r.correct_answer) o.classList.add("correct");
      });
    }
  }
  setTimeout(poll, 600);
}

function renderResult(r) {
  const title = document.getElementById("result-title");
  const rows = document.getElementById("result-rows");
  rows.innerHTML = "";
  const sorted = [...r.scores].sort((a, b) => b.score - a.score);
  sorted.forEach(s => {
    const row = document.createElement("div");
    row.className = "result-row" + (r.winner && s.name === r.winner ? " win" : "");
    row.innerHTML = `<span>${r.winner === s.name ? "🏆 " : ""}${s.name}${s.is_me ? " (ты)" : ""}</span><span>${s.score}/${r.total}</span>`;
    rows.appendChild(row);
  });
  title.textContent = r.winner ? "🏆 Батл завершён" : "🤝 Ничья!";
  showScreen("result");
}

loadLobby();
setInterval(() => { if (!battleId) loadLobby(); }, 3000);
</script>
</body>
</html>
