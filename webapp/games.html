<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Игры — OZMZ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif;background:#0B0D10;color:#F5F6F7;min-height:100%;padding:24px 16px calc(96px + env(safe-area-inset-bottom));-webkit-hyphens:none;hyphens:none;overflow-y:auto;-webkit-overflow-scrolling:touch}
.wrap{width:100%;max-width:440px;margin:0 auto}
.head{text-align:center;margin-bottom:20px}
.head h1{font-size:20px;font-weight:800;letter-spacing:-.2px}
.head p{font-size:13px;color:#6B7280;margin-top:4px}
.hidden{display:none!important}
.empty{text-align:center;color:#6B7280;font-size:14px;padding:40px 10px}
.game-card{background:#181A1F;border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 10px 26px rgba(0,0,0,.35);opacity:0;transform:translateY(8px);animation:gc-in .32s cubic-bezier(.2,.8,.2,1) forwards;position:relative;overflow:hidden}
.game-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#5E6AD2,#8B93F5,transparent)}
@keyframes gc-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── информационная иерархия карточки, сверху вниз: заголовок → фото поля
   (если есть) → поле/адрес → дата+день недели → время → цена → прогресс
   записи → кнопка действия → участники. Ощущение бронирования события,
   а не заполнения формы — фото, когда оно есть, идёт баннером сразу под
   заголовком, а не мелкой иконкой сбоку. ── */
.gc-title{font-size:13px;font-weight:700;color:#8B93F5;letter-spacing:.2px;margin-bottom:6px}
.gc-photo-banner{width:100%;height:112px;border-radius:14px;overflow:hidden;margin-bottom:10px;background:#20232B}
.gc-photo-banner img{width:100%;height:100%;object-fit:cover;display:block}
.gc-field-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.gc-field{flex:1;min-width:0;font-size:14px;font-weight:700;color:#C7CAD1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gc-field-addr{color:#6B7280;font-weight:500}
.gc-datetime-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.gc-date-chip,.gc-time-chip{font-size:12px;font-weight:700;padding:3px 9px;border-radius:7px;font-variant-numeric:tabular-nums;white-space:nowrap}
.gc-date-chip{background:rgba(94,106,210,.14);color:#8B93F5}
.gc-time-chip{background:rgba(255,255,255,.06);color:#C7CAD1}

/* ── строка ключевых цифр: цена / записано / свободно — сканируется за долю секунды ── */
.gc-price-chip{display:inline-flex;align-items:center;gap:5px;background:#101116;border-radius:10px;padding:8px 12px;margin-bottom:8px;font-size:13px;font-weight:800;color:#F5F6F7}

/* ── визуальный индикатор заполненности: сегментированная полоса + счёт +
   сообщение о свободных местах. При ≤5 местах — подсвечиваем тревожным
   цветом, чтобы создать ощущение срочности ── */
.gc-capacity{margin-bottom:10px}
.gc-capacity-bar{display:flex;gap:3px;margin-bottom:7px}
.gc-capacity-seg{flex:1;height:8px;border-radius:3px;background:rgba(255,255,255,.07)}
.gc-capacity-seg.filled{background:linear-gradient(90deg,#5E6AD2,#8B93F5)}
.gc-capacity-seg.filled.urgent{background:linear-gradient(90deg,#E5533D,#FF7A5C)}
.gc-capacity-meta{display:flex;align-items:center;justify-content:space-between;gap:8px}
.gc-capacity-count{font-size:12.5px;font-weight:700;color:#C7CAD1;font-variant-numeric:tabular-nums;white-space:nowrap}
.gc-capacity-spots{font-size:12px;font-weight:700;color:#6B7280;white-space:nowrap}
.gc-capacity-spots.urgent{color:#FF7A5C}
.gc-capacity-spots.full{color:#565A61}
.roster{background:#1D2027;border-radius:12px;padding:10px;margin-bottom:8px}
.roster-title{font-size:11px;font-weight:700;color:#9BA1AC;margin-bottom:8px}
.roster-empty{font-size:12px;color:#565A61}
.roster-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.player-card{background:#23262D;border-radius:12px;padding:9px 6px 8px;text-align:center;cursor:pointer;transition:transform .12s,background .12s}
.player-card:active{transform:scale(.95);background:#282B33}
.player-card-avatar{width:34px;height:34px;margin:0 auto 5px;border-radius:50%;background:rgba(94,106,210,.16);color:#8B93F5;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;border:2px solid transparent}
.player-card-avatar.confirmed{border-color:#30D158}
.player-card-avatar.pending{border-color:#E5A93C}
.player-card-name{font-size:11.5px;font-weight:700;color:#F5F6F7;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.player-card-guests{color:#6B7280;font-weight:600}
.player-card-ovr{font-size:10px;color:#8B93F5;font-weight:700;margin-top:2px}
.player-card-stats{font-size:9.5px;color:#6B7280;margin-top:2px;font-variant-numeric:tabular-nums;white-space:nowrap}
.roster-more-btn{width:100%;margin-top:8px;padding:9px;border-radius:10px;border:1px dashed rgba(255,255,255,.12);background:transparent;color:#8B93F5;font-size:12px;font-weight:700;cursor:pointer;text-align:center}
.roster-more-btn:active{background:rgba(94,106,210,.08)}
.guests-label{font-size:12px;color:#6B7280;display:block;margin-bottom:6px}
.guests-input{width:100%;padding:11px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:#23262D;color:#F5F6F7;font-size:16px;margin-bottom:10px}
.guests-input:focus{outline:none;border-color:#5E6AD2}
.btn{width:100%;padding:14px;border:none;border-radius:14px;font-weight:700;font-size:15px;cursor:pointer;background:#5E6AD2;color:#fff;transition:transform .15s,background .15s;box-shadow:0 4px 14px rgba(94,106,210,.3)}
.btn:active{transform:scale(.97);background:#525DC4}
.btn[disabled]{opacity:.5;pointer-events:none}
.status-badge{width:100%;text-align:center;padding:12px;border-radius:12px;font-size:13px;font-weight:700}
.status-pending{background:rgba(229,169,60,.12);color:#E5A93C;border:1px solid rgba(229,169,60,.3)}
.status-confirmed{background:rgba(48,209,88,.12);color:#30D158;border:1px solid rgba(48,209,88,.3)}
.error-banner{background:rgba(255,69,58,.12);border:1px solid rgba(255,69,58,.3);color:#FF6961;font-size:12px;padding:10px 12px;border-radius:10px;margin-bottom:12px;text-align:center}
.team-block{background:#1D2027;border-radius:10px;padding:8px;margin-top:8px}
.team-title{font-size:12px;font-weight:800;color:#8B93F5;margin-bottom:4px}
.team-player{font-size:12px;padding:2px 0;color:#9BA1AC}
.teams-title{font-size:11px;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;margin:8px 0 4px}
.text-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;box-sizing:border-box;padding:14px;border-radius:12px;font-weight:700;font-size:15px;text-align:center;cursor:pointer;text-decoration:none;transition:transform .15s,background .15s}
.text-btn:active{transform:scale(.97)}
.text-btn-primary{border:none;background:#5E6AD2;color:#fff;box-shadow:0 4px 14px rgba(94,106,210,.3)}
.text-btn-primary:active{background:#525DC4}
.text-btn-secondary{border:1px solid rgba(94,106,210,.4);background:rgba(94,106,210,.12);color:#8B93F5}
.text-btn-danger{border:1px solid rgba(255,69,58,.35);background:rgba(255,69,58,.08);color:#FF6961}
.secondary-row{display:flex;gap:8px;margin-top:8px}
.secondary-btn{flex:1;height:36px;display:flex;align-items:center;justify-content:center;gap:4px;padding:0 8px;border:1px solid rgba(255,255,255,.08);background:#1D2027;color:#D7D9DC;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer}
.add-toggle-btn{width:100%;height:40px;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px;border:1.5px solid rgba(94,106,210,.4);background:rgba(94,106,210,.1);color:#8B93F5;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer}

/* ── статус регистрации: 4 понятных состояния (Доступно / Забронировано,
   ждёт оплаты / Подтверждено / Матч завершён) — заголовок + статус +
   главное действие, чтобы всегда было понятно, что делать дальше ── */
.reg-card{background:#1D2027;border-radius:14px;margin-top:10px;padding:14px}
.reg-card.confirmed{background:linear-gradient(135deg,rgba(48,209,88,.08),#1D2027)}
.reg-card.completed{background:#1D2027}
.reg-headline{font-size:14.5px;font-weight:800;color:#F5F6F7;display:flex;align-items:center;gap:7px;margin-bottom:6px}
.reg-status-line{font-size:12.5px;color:#9BA1AC;margin-bottom:12px}
.reg-status-line b{color:#E5A93C;font-weight:700}
.reg-status-line b.confirmed{color:#30D158}
.reg-actions{display:flex;flex-direction:column;gap:8px}
.reg-extra-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06);font-size:12px;color:#9BA1AC}
.reg-extra-cancel-btn{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:9px 12px;border-radius:10px;border:1px solid rgba(255,69,58,.3);background:rgba(255,69,58,.08);color:#FF6961;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}

.gc-location-btn{flex-shrink:0;display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#8B93F5;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap}
.gc-location-btn:active{background:rgba(255,255,255,.08)}
.reg-stats-row{display:flex;gap:8px;margin-top:4px}
.reg-stat-badge{flex:1;background:#101116;border-radius:10px;padding:10px 6px;text-align:center}
.reg-stat-badge-value{font-size:17px;font-weight:800;color:#F5F6F7;font-variant-numeric:tabular-nums}
.reg-stat-badge-label{font-size:9.5px;color:#6B7280;text-transform:uppercase;letter-spacing:.4px;margin-top:3px;font-weight:600}
.reg-report-link{display:block;margin-top:12px;text-align:center;font-size:12.5px;font-weight:700;color:#8B93F5;text-decoration:none;padding:10px;border-radius:10px;background:rgba(94,106,210,.08);border:1px solid rgba(94,106,210,.2)}
.reg-report-link:active{background:rgba(94,106,210,.16)}
.atb-plus{font-size:16px;font-weight:800;line-height:1}
.atb-chevron{font-size:9px;opacity:.8}
.add-more-inline{display:flex;gap:8px;margin-top:8px}
.guests-input-inline{width:70px;flex-shrink:0;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:#23262D;color:#F5F6F7;font-size:16px;text-align:center}
.guests-input-inline:focus{outline:none;border-color:#5E6AD2}
.btn-switch-inline{flex:1;padding:9px;border:1px solid rgba(94,106,210,.4);background:transparent;color:#8B93F5;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer}
.teams-body{margin-top:8px}
.filters{position:sticky;top:0;z-index:20;display:flex;gap:8px;margin:0 0 16px;padding:14px 0 10px;overflow-x:auto;background:#0B0D10}
.filter-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:20px;background:#181A1F;border:1px solid rgba(255,255,255,.08);color:#9BA1AC;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .2s,color .2s,border-color .2s,transform .12s}
.filter-chip:active{transform:scale(.95)}
.filter-chip.active{background:#5E6AD2;border-color:#5E6AD2;color:#fff;box-shadow:0 4px 14px rgba(94,106,210,.35)}

/* ── нижняя навигация: тот же компонент, что и на главной ── */
.bottom-nav{position:fixed;left:0;right:0;bottom:0;display:flex;background:rgba(11,13,16,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,.07);z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;height:56px;cursor:pointer;color:#565A61;transition:color .15s;-webkit-tap-highlight-color:transparent}
.bn-item .bn-icon{font-size:20px;line-height:1}
.bn-item .bn-label{font-size:10px;font-weight:700}
.bn-item.active{color:#8B93F5}
.bn-item:active{opacity:.7}
.chat-box{margin-top:8px;background:#1D2027;border-radius:12px;padding:8px}
.chat-messages{max-height:220px;overflow-y:auto;margin-bottom:8px;display:flex;flex-direction:column;gap:8px}
.chat-msg{font-size:12px;line-height:1.4;color:#D7D9DC}
.chat-msg .who{font-weight:700;color:#9BA1AC;margin-right:4px}
.chat-msg.mine .who{color:#8B93F5}
.chat-empty{font-size:12px;color:#565A61;text-align:center;padding:8px 0}
.chat-input-row{display:flex;gap:8px}
.chat-input{flex:1;padding:9px 12px;border-radius:9px;border:1px solid rgba(255,255,255,.08);background:#23262D;color:#F5F6F7;font-size:14px}
.chat-input:focus{outline:none;border-color:#5E6AD2}
.chat-send-btn{padding:9px 14px;border:none;border-radius:9px;background:#5E6AD2;color:#fff;font-weight:800;font-size:13px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>⚽ Игры</h1>
    <p>Записывайся и приходи играть</p>
  </div>
  <div id="error-banner"></div>
  <div class="filters" id="filters"></div>
  <div id="games-list"></div>
</div>

<nav class="bottom-nav">
  <div class="bn-item" data-tab="home" onclick="bnGo('home')">
    <div class="bn-icon">🏠</div>
    <div class="bn-label">Home</div>
  </div>
  <div class="bn-item active" data-tab="games" onclick="bnGo('games')">
    <div class="bn-icon">⚽</div>
    <div class="bn-label">Игры</div>
  </div>
  <div class="bn-item" data-tab="profile" onclick="bnGo('profile')">
    <div class="bn-icon">👤</div>
    <div class="bn-label">Профиль</div>
  </div>
</nav>

<script>
let userId = new URLSearchParams(location.search).get("uid");

function goBackToMenu() {
  location.href = "/app" + (userId ? ("?uid=" + userId) : "");
}

function bnGo(tab) {
  if (tab === "games") return; // уже здесь
  if (tab === "home") { goBackToMenu(); return; }
  if (tab === "profile") {
    location.href = "/app?tab=profile" + (userId ? ("&uid=" + userId) : "");
  }
}

if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  // Отключаем свайп-вниз для закрытия/сворачивания приложения — он часто
  // срабатывает случайно при обычном скролле контента. Скролл и
  // pull-to-refresh внутри приложения при этом продолжают работать как
  // обычно; закрыть можно только кнопкой «Закрыть» в шапке Telegram.
  if (typeof Telegram.WebApp.disableVerticalSwipes === "function") {
    Telegram.WebApp.disableVerticalSwipes();
  }
  if (!userId) {
    const tgUser = Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user;
    if (tgUser && tgUser.id) userId = String(tgUser.id);
  }
  Telegram.WebApp.BackButton.show();
  Telegram.WebApp.BackButton.onClick(goBackToMenu);
}

// Свайп вправо от левого края экрана — тоже работает как "назад"
(function () {
  let startX = null, startY = null;
  document.addEventListener("touchstart", e => {
    const t = e.touches[0];
    if (t.clientX < 24) { startX = t.clientX; startY = t.clientY; }
  }, { passive: true });
  document.addEventListener("touchend", e => {
    if (startX === null) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = Math.abs(t.clientY - startY);
    if (dx > 70 && dy < 60) goBackToMenu();
    startX = null;
  }, { passive: true });
})();

function showError(msg) {
  document.getElementById("error-banner").innerHTML = `<div class="error-banner">⚠️ ${msg}</div>`;
}

// Дата игры форматируется под язык пользователя (Telegram language_code,
// иначе язык браузера) и везде включает день недели — не только число,
// чтобы сразу было понятно, на какой день приходится игра.
function localeCode() {
  const tw = window.Telegram && Telegram.WebApp;
  const tgLang = tw && tw.initDataUnsafe && tw.initDataUnsafe.user && tw.initDataUnsafe.user.language_code;
  return tgLang || navigator.language || "ru";
}

function capitalize(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
}

function parseGameDate(g) {
  // ожидаем ISO "YYYY-MM-DD"; для старых игр с другим форматом — null (не участвуют в фильтрах)
  if (!g.date || !/^\d{4}-\d{2}-\d{2}$/.test(g.date)) return null;
  const [y, m, d] = g.date.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function formatDate(g) {
  const dt = parseGameDate(g);
  if (!dt) return g.date || "";
  const loc = localeCode();
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = Math.round((dt - today) / 86400000);
  const dayMonth = new Intl.DateTimeFormat(loc, { day: "numeric", month: "long" }).format(dt).replace(/\.$/, "");
  if (diffDays === 0) return `Сегодня, ${dayMonth}`;
  if (diffDays === 1) return `Завтра, ${dayMonth}`;
  const weekday = capitalize(new Intl.DateTimeFormat(loc, { weekday: "long" }).format(dt));
  return `${weekday}, ${dayMonth}`;
}

function shortDate(g) {
  const dt = parseGameDate(g);
  if (!dt) return g.date || "дата?";
  const loc = localeCode();
  const weekday = capitalize(new Intl.DateTimeFormat(loc, { weekday: "short" }).format(dt));
  const dayMonth = new Intl.DateTimeFormat(loc, { day: "numeric", month: "short" }).format(dt).replace(/\.$/, "");
  return `${weekday}, ${dayMonth}`;
}


function isUpcoming(g) {
  const dt = parseGameDate(g);
  if (!dt) return true; // старый формат даты — не теряем игру, считаем предстоящей
  const today = new Date(); today.setHours(0, 0, 0, 0);
  return dt >= today;
}

function hasAnySignup(g) {
  return (g.my_signups || []).length > 0;
}

function hasConfirmedSignup(g) {
  return (g.my_signups || []).some(s => s.status === "confirmed");
}

function hasOpenSpots(g) {
  if (!g.num_players) return true; // лимит не задан — считаем открытой
  return totalPeople(g.signups, "confirmed") < g.num_players;
}

// Каждая категория — просто предикат над игрой. Чтобы добавить новую вкладку,
// достаточно дописать сюда ещё один объект — вся остальная логика подхватит её сама.
//
// «Мои игры» — только после того, как организатор подтвердил оплату
// (status === "confirmed"). До этого момента игра остаётся в «Доступные» —
// НЕ переезжает в отдельную вкладку — но карточка сама показывает статус
// «Место забронировано · Ждёт оплаты» (см. gameRegistrationStatusWidget),
// так игрок видит и свободные игры, и свою бронь в одном месте и сразу
// понимает: заплатить — и она переедет в «Мои игры» автоматически.
const FILTERS = [
  { id: "available", label: "🏟 Доступные",
    match: g => isUpcoming(g) && !hasConfirmedSignup(g) && (hasAnySignup(g) || hasOpenSpots(g)),
    empty: "Свободных игр пока нет ⚽<br>Загляни позже!" },
  { id: "mine", label: "🟢 Мои игры",
    match: g => isUpcoming(g) && hasConfirmedSignup(g),
    empty: "Пока нет подтверждённых игр.<br>Забронируй место во «Доступные» 🏟 — как только организатор подтвердит оплату, игра появится здесь." },
  { id: "history", label: "✅ История",
    match: g => !isUpcoming(g) && hasAnySignup(g),
    empty: "Пока нет сыгранных игр — они появятся здесь после матча." },
];

let currentFilter = "available";

function matchesFilter(g) {
  const f = FILTERS.find(f => f.id === currentFilter) || FILTERS[0];
  return f.match(g);
}

function currentEmptyMessage() {
  const f = FILTERS.find(f => f.id === currentFilter) || FILTERS[0];
  return f.empty;
}

function renderFilters() {
  document.getElementById("filters").innerHTML = FILTERS.map(f => `
    <div class="filter-chip ${currentFilter === f.id ? "active" : ""}" onclick="setFilter('${f.id}')">${f.label}</div>
  `).join("");
}

function setFilter(id) {
  currentFilter = id;
  renderFilters();
  renderGames(window.__lastGames || []);
}

function openPlayer(targetUserId) {
  if (!targetUserId) return;
  const params = new URLSearchParams();
  params.set("uid", targetUserId);
  if (userId) params.set("me", userId);
  location.href = "/player?" + params.toString();
}

function avatarLetter(name) {
  return ((name || "?").trim().charAt(0) || "?").toUpperCase();
}

// Один реальный человек может встречаться в записях несколько раз — основная
// запись + отдельно добавленные им же гости под тем же user_id. Схлопываем
// это в одну карточку на человека (а не на запись), суммируя гостей и считая
// человека подтверждённым, если подтверждена хотя бы одна из его записей.
function dedupeRoster(signups) {
  const byId = new Map();
  (signups || []).forEach(s => {
    if (!s.user_id) return; // без аккаунта — отдельной карточкой не показываем
    if (!byId.has(s.user_id)) {
      byId.set(s.user_id, {
        user_id: s.user_id, name: s.name, guests: 0, confirmed: false,
        ovr: s.ovr, games_played: s.games_played, goals: s.goals,
      });
    }
    const entry = byId.get(s.user_id);
    entry.guests += (s.guests_count || 0);
    if (s.status === "confirmed") entry.confirmed = true;
  });
  return Array.from(byId.values());
}

function playerCardHtml(p) {
  const statusCls = p.confirmed ? "confirmed" : "pending";
  const guestsBadge = p.guests > 0 ? `<span class="player-card-guests"> +${p.guests}</span>` : "";
  return `
    <div class="player-card" onclick="openPlayer('${p.user_id}')">
      <div class="player-card-avatar ${statusCls}">${avatarLetter(p.name)}</div>
      <div class="player-card-name">${p.name}${guestsBadge}</div>
      <div class="player-card-ovr">OVR ${p.ovr ?? "—"}</div>
      <div class="player-card-stats">🎮 ${p.games_played ?? 0} ⚽ ${p.goals ?? 0}</div>
    </div>`;
}

let rosterExpanded = {};

function toggleRosterExpanded(gameId) {
  rosterExpanded[gameId] = !rosterExpanded[gameId];
  renderGames(window.__lastGames || []);
}

// Показываем первых 6 компактными карточками (аватар, ник, OVR, игры,
// голы) — этого достаточно, чтобы окинуть состав взглядом. Остальные
// открываются по тапу на "+N ещё игроков", не уходя с экрана игры.
function rosterHtml(gameId, signups) {
  const players = dedupeRoster(signups);
  if (players.length === 0) {
    return `<div class="roster-empty">Пока никто не записался</div>`;
  }

  const expanded = !!rosterExpanded[gameId];
  const shown = expanded ? players : players.slice(0, 6);
  const extra = players.length - shown.length;

  const grid = `<div class="roster-grid">${shown.map(playerCardHtml).join("")}</div>`;
  let moreBtn = "";
  if (extra > 0) {
    moreBtn = `<button class="roster-more-btn" onclick="toggleRosterExpanded(${gameId})">+${extra} ещё игроков</button>`;
  } else if (expanded && players.length > 6) {
    moreBtn = `<button class="roster-more-btn" onclick="toggleRosterExpanded(${gameId})">Свернуть ▲</button>`;
  }
  return grid + moreBtn;
}

function entryPeopleCount(s) {
  return s.is_addition ? (s.guests_count || 1) : 1 + (s.guests_count || 0);
}

// ── карточка игры: переиспользуемые виджеты ──────────────────────────────────

function mapsUrl(g) {
  const query = g.location + (g.extra_info ? `, ${g.extra_info}` : "");
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
}

// 1. Заголовок матча — первое, что видно.
function gameTitleWidget(g) {
  return `<div class="gc-title">⚽ Футбольный матч</div>`;
}

// 2. Фото поля — если админ его загрузил, показываем баннером на всю
// ширину карточки сразу под заголовком (ощущение бронирования события —
// сначала картинка места, а не мелкая иконка сбоку). Если фото нет, просто
// не резервируем под него место — лишний пустой блок только добавил бы
// прокрутки без всякой пользы.
function gamePhotoBannerWidget(g) {
  if (!g.image) return "";
  return `<div class="gc-photo-banner"><img src="data:image/jpeg;base64,${g.image}" alt="${g.location}"></div>`;
}

// 3. Поле/адрес — подпись места проведения, компактной строкой, с быстрой
// ссылкой на карту рядом.
function gameFieldWidget(g) {
  const addr = g.extra_info ? ` <span class="gc-field-addr">· ${g.extra_info}</span>` : "";
  return `
    <div class="gc-field-row">
      <div class="gc-field">📍 ${g.location}${addr}</div>
      <a class="gc-location-btn" href="${mapsUrl(g)}" target="_blank" onclick="event.stopPropagation()">Открыть</a>
    </div>`;
}

// 4-5. Дата (+день недели) и время.
function gameDateTimeWidget(g) {
  return `
    <div class="gc-datetime-row">
      <span class="gc-date-chip">${shortDate(g)}</span>
      <span class="gc-time-chip">🕐 ${g.time}</span>
    </div>`;
}

// 6. Цена.
function gamePriceWidget(g) {
  if (!g.price) return "";
  return `<div class="gc-price-chip">💰 ${g.price}</div>`;
}

// Русское склонение "место/места/мест" по числу (1 место, 2-4 места, 5+ мест).
function pluralSpots(n) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return "место";
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return "места";
  return "мест";
}

// 7 (часть 1). Прогресс записи — визуальный индикатор заполненности:
// сегментированная полоса (10 делений, как в примере из ТЗ —
// "████████░░"), счёт "16 / 20 игроков" и сообщение "Осталось всего N мест".
// Когда свободных мест ≤5 — полоса и сообщение подсвечиваются тревожным
// цветом, создавая ощущение срочности.
function gameCapacityWidget(g, confirmedCount) {
  const max = g.num_players || null;

  if (!max) {
    // Лимит не задан — просто показываем, сколько человек уже записалось,
    // без полосы/сообщения о местах (их в принципе не может не хватить).
    return `<div class="gc-capacity-meta"><span class="gc-capacity-count">👥 ${confirmedCount} игроков записано</span></div>`;
  }

  const freeSpots = Math.max(0, max - confirmedCount);
  const urgent = freeSpots > 0 && freeSpots <= 5;
  const full = freeSpots === 0;

  const totalSegments = 10;
  const filledSegments = Math.round(Math.min(1, confirmedCount / max) * totalSegments);
  const segmentsHtml = Array.from({ length: totalSegments }, (_, i) =>
    `<div class="gc-capacity-seg${i < filledSegments ? ` filled${urgent ? " urgent" : ""}` : ""}"></div>`
  ).join("");

  let spotsText;
  if (full) spotsText = "Мест нет";
  else if (freeSpots === 1) spotsText = "Остался всего 1 спот!";
  else if (urgent) spotsText = `Осталось всего ${freeSpots} ${pluralSpots(freeSpots)}!`;
  else spotsText = `${freeSpots} своб. мест`;
  const spotsCls = full ? "full" : urgent ? "urgent" : "";

  return `
    <div class="gc-capacity">
      <div class="gc-capacity-bar">${segmentsHtml}</div>
      <div class="gc-capacity-meta">
        <span class="gc-capacity-count">👥 ${confirmedCount} / ${max} игроков</span>
        <span class="gc-capacity-spots ${spotsCls}">${spotsText}</span>
      </div>
    </div>`;
}

function gameRosterWidget(g, totalCount) {
  return `
    <div class="roster">
      <div class="roster-title">👥 Участники (${totalCount})</div>
      ${rosterHtml(g.id, g.signups)}
    </div>`;
}

function gameAddFormWidget(g, mySignups) {
  // Матч уже прошёл — раздел "добавить игроков"/записаться тут не нужен,
  // карточка уже показывает состояние «Матч завершён» (см.
  // gameRegistrationStatusWidget → completedStateHtml).
  if (!isUpcoming(g)) return "";

  if (mySignups.length === 0) {
    return `
      <label class="guests-label">Сколько вас всего придёт (с тобой)?</label>
      <input type="number" class="guests-input" id="guests-${g.id}" min="1" max="20" value="1">
      <button class="btn" onclick="signup(${g.id})">⚽ Забронировать место</button>`;
  }
  const addExpanded = !!addFormExpanded[g.id];
  return `
    <button class="add-toggle-btn" onclick="toggleAddForm(${g.id})"><span class="atb-plus">+</span> Добавить игроков <span class="atb-chevron">${addExpanded ? "▲" : "▼"}</span></button>
    <div class="add-more-inline ${addExpanded ? "" : "hidden"}" id="add-form-${g.id}">
      <input type="number" class="guests-input-inline" id="addmore-${g.id}" min="1" max="20" value="1">
      <button class="btn-switch-inline" onclick="addMorePeople(${g.id})">Добавить</button>
    </div>`;
}

function gameSecondaryWidget(g, mySignups) {
  if (!mySignups.length) return "";
  return `
    <div class="secondary-row">
      <button class="secondary-btn" onclick="toggleTeamsDisplay(${g.id})">🏆 Команды</button>
      <button class="secondary-btn" onclick="toggleChat(${g.id})" id="chat-toggle-${g.id}">💬 Чат</button>
    </div>
    <div class="teams-body ${teamsExpanded[g.id] ? "" : "hidden"}" id="teams-body-wrap-${g.id}">${teamsExpanded[g.id] ? teamsInnerHtml(g.teams) : ""}</div>
    <div class="chat-box hidden" id="chat-box-${g.id}">
      <div class="chat-messages" id="chat-messages-${g.id}"></div>
      <div class="chat-input-row">
        <input class="chat-input" id="chat-input-${g.id}" placeholder="Написать..." maxlength="500">
        <button class="chat-send-btn" onclick="sendChatMessage(${g.id})">➤</button>
      </div>
    </div>`;
}

// Порядок сборки карточки — это и есть иерархия важности информации:
// заголовок → фото поля → поле/адрес → дата+день недели → время → цена →
// прогресс записи → кнопка действия → участники. Экран должен читаться как
// бронирование события сверху вниз, а не как разрозненная форма.
function gameCardWidget(g, index) {
  const confirmedCount = totalPeople(g.signups, "confirmed");
  const totalCount = totalPeople(g.signups, null);
  const mySignups = g.my_signups || [];
  const delay = Math.min(index || 0, 8) * 0.045;

  return `
    <div class="game-card" style="animation-delay:${delay}s">
      ${gameTitleWidget(g)}
      ${gamePhotoBannerWidget(g)}
      ${gameFieldWidget(g)}
      ${gameDateTimeWidget(g)}
      ${gamePriceWidget(g)}
      ${gameCapacityWidget(g, confirmedCount)}
      ${gameRegistrationStatusWidget(g)}
      ${gameAddFormWidget(g, mySignups)}
      ${gameRosterWidget(g, totalCount)}
      ${gameSecondaryWidget(g, mySignups)}
    </div>`;
}

let teamsExpanded = {};

function toggleTeamsDisplay(gameId) {
  teamsExpanded[gameId] = !teamsExpanded[gameId];
  renderGames(window.__lastGames || []);
}

function totalPeople(signups, statusFilter) {
  return (signups || [])
    .filter(s => !statusFilter || s.status === statusFilter)
    .reduce((sum, s) => sum + entryPeopleCount(s), 0);
}

// ── Статус регистрации: 4 понятных состояния ────────────────────────────────
// 1. Доступно        → форма записи с кнопкой «Забронировать место» (см.
//                       gameAddFormWidget) — этот виджет тут ничего не рисует.
// 2. Забронировано,
//    ждёт оплаты      → «Место забронировано» + статус + кнопка «Оплатить».
// 3. Подтверждено     → «Ты подтверждён на эту игру».
// 4. Матч завершён     → «Матч завершён» + статистика игрока в этом матче,
//                       если она есть (голы/MVP, my_match_stats из /api/games).
// Игрок всегда видит один и тот же паттерн: заголовок → статус → главное
// действие — и всегда понимает, что делать дальше.

function extraEntryRow(gameId, s) {
  const count = entryPeopleCount(s);
  const label = s.status === "confirmed" ? "🟢 Подтверждено"
    : s.payment_claimed ? "🟡 Ждём подтверждения" : "🟡 Ждёт оплаты";
  const warnNoRefund = s.status === "confirmed" || s.payment_claimed;
  return `
    <div class="reg-extra-row">
      <span>+ Доп. игроки · ${count} чел. — ${label}</span>
      <button class="reg-extra-cancel-btn" onclick="cancelEntry(${gameId}, ${s.id}, ${warnNoRefund})">❌ Отменить</button>
    </div>`;
}

function reservedStateHtml(g, mySignups) {
  const main = mySignups[0];
  const extra = mySignups.slice(1);
  const claimed = main.payment_claimed;
  const count = entryPeopleCount(main);

  let actionsHtml;
  if (claimed) {
    // Уже нажал «Я оплатил(а)» — платить больше нечего, ждём организатора.
    actionsHtml = `<button class="text-btn text-btn-danger" onclick="cancelEntry(${g.id}, ${main.id}, true)">❌ Отменить бронь</button>`;
  } else {
    const payBtn = g.payment_link
      ? `<a class="text-btn text-btn-primary" href="${g.payment_link}" target="_blank">💳 Оплатить</a>`
      : `<button class="text-btn text-btn-primary" onclick="claimPayment(${g.id}, ${main.id})">💳 Оплатить</button>`;
    const confirmBtn = g.payment_link
      ? `<button class="text-btn text-btn-secondary" onclick="claimPayment(${g.id}, ${main.id})">✅ Я оплатил(а)</button>`
      : "";
    actionsHtml = `
      ${payBtn}
      ${confirmBtn}
      <button class="text-btn text-btn-danger" onclick="cancelEntry(${g.id}, ${main.id}, false)">❌ Отменить бронь</button>`;
  }

  return `
    <div class="reg-card">
      <div class="reg-headline">📌 Место забронировано</div>
      <div class="reg-status-line">Статус: <b>${claimed ? "Ждём подтверждения" : "Ждёт оплаты"}</b>${count > 1 ? ` · ${count} чел.` : ""}</div>
      <div class="reg-actions">${actionsHtml}</div>
      ${extra.map(s => extraEntryRow(g.id, s)).join("")}
    </div>`;
}

function confirmedStateHtml(g, mySignups) {
  const confirmedEntries = mySignups.filter(s => s.status === "confirmed");
  const main = confirmedEntries[0] || mySignups[0];
  const extra = mySignups.filter(s => s.id !== main.id);
  const count = entryPeopleCount(main);

  return `
    <div class="reg-card confirmed">
      <div class="reg-headline">✅ Ты подтверждён на эту игру</div>
      <div class="reg-status-line">Статус: <b class="confirmed">Подтверждено</b>${count > 1 ? ` · ${count} чел.` : ""}</div>
      <div class="reg-actions">
        <button class="text-btn text-btn-danger" onclick="cancelEntry(${g.id}, ${main.id}, true)">❌ Отменить регистрацию</button>
      </div>
      ${extra.map(s => extraEntryRow(g.id, s)).join("")}
    </div>`;
}

function completedStateHtml(g) {
  const stats = g.my_match_stats;
  // «Показывать статистику, когда она есть» — если по этому матчу ещё не
  // заводили голы/MVP (например, игру завершили старым способом без формы
  // статистики), просто не показываем блок с цифрами, а не выдумываем нули.
  const statsHtml = stats ? `
    <div class="reg-stats-row">
      <div class="reg-stat-badge">
        <div class="reg-stat-badge-value">⚽ ${stats.goals}</div>
        <div class="reg-stat-badge-label">Голы</div>
      </div>
      <div class="reg-stat-badge">
        <div class="reg-stat-badge-value">${stats.is_mvp ? "👑" : "—"}</div>
        <div class="reg-stat-badge-label">MVP</div>
      </div>
    </div>` : "";

  return `
    <div class="reg-card completed">
      <div class="reg-headline">🏁 Матч завершён</div>
      ${statsHtml}
      <a class="reg-report-link" href="/match-report?game_id=${g.id}${userId ? `&uid=${userId}` : ""}">📊 Отчёт о матче →</a>
    </div>`;
}

function gameRegistrationStatusWidget(g) {
  const mySignups = g.my_signups || [];
  if (!isUpcoming(g)) {
    // Матч уже прошёл — неважно, в каком статусе была запись, теперь это
    // просто «Матч завершён» (+ статистика, если она есть).
    return mySignups.length ? completedStateHtml(g) : "";
  }
  if (mySignups.length === 0) return ""; // состояние «Доступно» — см. gameAddFormWidget
  if (mySignups.some(s => s.status === "confirmed")) return confirmedStateHtml(g, mySignups);
  return reservedStateHtml(g, mySignups);
}

function renderGames(games) {
  window.__lastGames = games || [];
  const el = document.getElementById("games-list");
  const filtered = (games || []).filter(matchesFilter);

  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty">${currentEmptyMessage()}</div>`;
    return;
  }

  el.innerHTML = filtered.map((g, i) => gameCardWidget(g, i)).join("");
}

let addFormExpanded = {};

function toggleAddForm(gameId) {
  addFormExpanded[gameId] = !addFormExpanded[gameId];
  renderGames(window.__lastGames || []);
}

function teamsInnerHtml(teams) {
  if (!teams || teams.length === 0) return `<div class="roster-empty">Пока не сформированы</div>`;
  const byTeam = {};
  teams.forEach(m => (byTeam[m.team_index] = byTeam[m.team_index] || []).push(m));
  const indices = Object.keys(byTeam).map(Number).sort((a, b) => a - b);
  return indices.map(i => `
    <div class="team-block">
      <div class="team-title">Команда ${i + 1} (${byTeam[i].length})</div>
      ${byTeam[i].map(p => `<div class="team-player">${p.name}${p.player ? ` — <i>${p.player}</i>` : ""}</div>`).join("")}
    </div>`).join("");
}

let lastGamesHash = "";

async function loadGames() {
  try {
    const r = await fetch(`/api/games?user_id=${userId || ""}`).then(r => r.json());
    const hash = JSON.stringify(r.games);
    if (hash === lastGamesHash) return; // ничего не изменилось — не дёргаем DOM зря
    lastGamesHash = hash;
    renderGames(r.games);
  } catch (e) {
    showError("Не удалось загрузить игры. Попробуй ещё раз.");
  }
}

async function signup(gameId) {
  if (!userId) {
    showError("Не удалось определить тебя. Открой игры заново через бота.");
    return;
  }
  const guestsInput = document.getElementById(`guests-${gameId}`);
  const totalPeopleCount = guestsInput ? parseInt(guestsInput.value, 10) || 1 : 1;
  const guestsCount = Math.max(0, totalPeopleCount - 1);

  try {
    const res = await fetch("/api/games/signup", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId, game_id: gameId, guests_count: guestsCount })
    }).then(r => r.json());
    if (!res.ok) {
      showError(res.error || "Не удалось записаться.");
    } else {
      document.getElementById("error-banner").innerHTML = "";
      loadGames();
    }
  } catch (e) {
    showError("Ошибка сети — попробуй ещё раз.");
  }
}

async function addMorePeople(gameId) {
  if (!userId) return;
  const input = document.getElementById(`addmore-${gameId}`);
  const guestsCount = parseInt(input.value, 10) || 1;

  try {
    const res = await fetch("/api/games/signup", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId, game_id: gameId, guests_count: guestsCount, is_addition: true })
    }).then(r => r.json());
    if (!res.ok) {
      showError(res.error || "Не удалось добавить игроков.");
    } else {
      document.getElementById("error-banner").innerHTML = "";
      loadGames();
    }
  } catch (e) {
    showError("Ошибка сети — попробуй ещё раз.");
  }
}

async function claimPayment(gameId, entryId) {
  if (!userId) return;
  try {
    const res = await fetch("/api/games/claim-payment", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId, game_id: gameId, entry_id: entryId })
    }).then(r => r.json());
    if (res.ok) {
      document.getElementById("error-banner").innerHTML = "";
      loadGames();
    } else {
      showError(res.error || "Не удалось отметить оплату.");
    }
  } catch (e) {
    showError("Ошибка сети — попробуй ещё раз.");
  }
}

async function cancelEntry(gameId, entryId, warnNoRefund) {
  if (!userId) return;
  if (warnNoRefund) {
    const ok = confirm("Деньги за оплату не возвращаются при отказе. Точно хочешь отказаться?");
    if (!ok) return;
  }
  try {
    const res = await fetch("/api/games/cancel-signup", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId, game_id: gameId, entry_id: entryId })
    }).then(r => r.json());
    if (res.ok) {
      document.getElementById("error-banner").innerHTML = "";
      loadGames();
    } else {
      showError(res.error || "Не удалось отменить запись.");
    }
  } catch (e) {
    showError("Ошибка сети — попробуй ещё раз.");
  }
}

let openChats = {};       // gameId -> true/false
let chatPollTimers = {};  // gameId -> intervalId
let chatMessages = {};    // gameId -> [messages]

function renderChatMessages(gameId) {
  const el = document.getElementById(`chat-messages-${gameId}`);
  if (!el) return;
  const msgs = chatMessages[gameId] || [];
  if (msgs.length === 0) {
    el.innerHTML = `<div class="chat-empty">Пока тишина — напиши первым</div>`;
  } else {
    const wasAtBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 10;
    el.innerHTML = msgs.map(m => {
      const mine = m.user_id === userId ? " mine" : "";
      return `<div class="chat-msg${mine}"><span class="who">${m.name}:</span>${m.text}</div>`;
    }).join("");
    if (wasAtBottom || msgs.length <= 20) el.scrollTop = el.scrollHeight;
  }
}

async function pollChat(gameId) {
  if (!userId) return;
  try {
    const r = await fetch(`/api/games/chat?user_id=${userId}&game_id=${gameId}&since_id=0`).then(r => r.json());
    if (r.messages) {
      chatMessages[gameId] = r.messages;
      renderChatMessages(gameId);
    }
  } catch (e) {}
}

function toggleChat(gameId) {
  const box = document.getElementById(`chat-box-${gameId}`);
  const btn = document.getElementById(`chat-toggle-${gameId}`);
  if (openChats[gameId]) {
    box.classList.add("hidden");
    openChats[gameId] = false;
    btn.textContent = "💬 Чат";
    clearInterval(chatPollTimers[gameId]);
  } else {
    box.classList.remove("hidden");
    openChats[gameId] = true;
    btn.textContent = "🔼 Скрыть";
    pollChat(gameId);
    chatPollTimers[gameId] = setInterval(() => pollChat(gameId), 3000);
  }
}

async function sendChatMessage(gameId) {
  const input = document.getElementById(`chat-input-${gameId}`);
  const text = input.value.trim();
  if (!text || !userId) return;
  input.value = "";
  try {
    const res = await fetch("/api/games/chat/send", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId, game_id: gameId, text })
    }).then(r => r.json());
    if (res.ok) pollChat(gameId);
    else showError(res.error || "Не удалось отправить сообщение.");
  } catch (e) {
    showError("Ошибка сети — попробуй ещё раз.");
  }
}

renderFilters();
loadGames();
setInterval(() => {
  const anyChatOpen = Object.values(openChats).some(v => v);
  const anyAddFormOpen = Object.values(addFormExpanded).some(v => v);
  const gamesListEl = document.getElementById("games-list");
  const typingNow = gamesListEl && gamesListEl.contains(document.activeElement)
    && (document.activeElement.tagName === "INPUT");
  if (!anyChatOpen && !anyAddFormOpen && !typingNow) loadGames();
}, 4000);
</script>
