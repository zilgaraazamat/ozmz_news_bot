<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Игры — OZMZ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif;background:#0e1a12;color:#f5f5f0;min-height:100%;padding:24px 16px 60px;-webkit-hyphens:none;hyphens:none;overflow-y:auto;-webkit-overflow-scrolling:touch}
.wrap{width:100%;max-width:440px;margin:0 auto}
.head{text-align:center;margin-bottom:20px}
.head h1{font-size:20px;font-weight:900}
.head p{font-size:13px;color:#6b7c6e;margin-top:4px}
.hidden{display:none!important}
.empty{text-align:center;color:#6b7c6e;font-size:14px;padding:40px 10px}
.game-card{background:#1e3024;border:1px solid rgba(126,217,87,.18);border-radius:18px;padding:18px;margin-bottom:16px}
.game-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.game-when{font-size:16px;font-weight:800}
.game-price{font-size:13px;font-weight:700;color:#7ed957;background:rgba(126,217,87,.12);padding:4px 10px;border-radius:8px;white-space:nowrap}
.game-loc{font-size:13px;color:#9db3a3;margin-bottom:6px}
.game-extra{font-size:12px;color:#6b7c6e;margin-bottom:10px;line-height:1.4}
.game-count{font-size:12px;color:#6b7c6e;margin-bottom:12px}
.error-banner{background:rgba(255,80,80,.12);border:1px solid rgba(255,80,80,.35);color:#ff8080;font-size:12px;padding:10px 12px;border-radius:10px;margin-bottom:12px;text-align:center}

.slots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:8px;margin-bottom:8px}
.slot{border-radius:10px;padding:8px 6px;text-align:center;cursor:pointer;transition:transform .15s;min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.slot:active{transform:scale(.94)}
.slot-free{background:rgba(255,255,255,.04);border:1px dashed rgba(126,217,87,.3);color:#6b7c6e}
.slot-mine{background:rgba(126,217,87,.16);border:1px solid #7ed957}
.slot-confirmed{background:rgba(126,217,87,.28);border:1px solid #7ed957}
.slot-other{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);cursor:default}
.slot-num{font-size:9px;color:#6b7c6e;font-weight:700}
.slot-name{font-size:11px;font-weight:700;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.slot-player{font-size:9px;color:#9db3a3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.slot-plus{font-size:18px;color:#7ed957}
.no-slots{font-size:12px;color:#6b7c6e;text-align:center;padding:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>⚽ Игры</h1>
    <p>Занимай слоты — можно несколько раз подряд</p>
  </div>
  <div id="error-banner"></div>
  <div id="games-list"></div>
</div>

<script>
let userId = new URLSearchParams(location.search).get("uid");

if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  if (!userId) {
    const tgUser = Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user;
    if (tgUser && tgUser.id) userId = String(tgUser.id);
  }
  Telegram.WebApp.BackButton.show();
  Telegram.WebApp.BackButton.onClick(() => { location.href = "/app" + (userId ? ("?uid=" + userId) : ""); });
}

function showError(msg) {
  document.getElementById("error-banner").innerHTML = `<div class="error-banner">⚠️ ${msg}</div>`;
}

function slotHtml(gameId, s) {
  if (!s.user_id) {
    return `<div class="slot slot-free" onclick="claimSlot(${gameId}, ${s.slot_index})">
      <div class="slot-plus">+</div>
      <div class="slot-num">№${s.slot_index}</div>
    </div>`;
  }
  const isMine = s.user_id === userId;
  const cls = isMine ? (s.status === "confirmed" ? "slot-confirmed" : "slot-mine") : "slot-other";
  const click = isMine ? `onclick="releaseSlot(${gameId}, ${s.slot_index})"` : "";
  const hint = isMine ? (s.status === "confirmed" ? " ✅" : " (тап — уйти)") : "";
  return `<div class="slot ${cls}" ${click}>
    <div class="slot-name">${s.name}${isMine && s.status !== "confirmed" ? "" : ""}</div>
    ${s.player ? `<div class="slot-player">${s.player}</div>` : ""}
    <div class="slot-num">№${s.slot_index}${isMine && s.status === "confirmed" ? " ✅" : ""}</div>
  </div>`;
}

function renderGames(games) {
  const el = document.getElementById("games-list");
  if (!games || games.length === 0) {
    el.innerHTML = `<div class="empty">Активных игр пока нет ⚽<br>Загляни позже!</div>`;
    return;
  }

  el.innerHTML = games.map(g => {
    const slots = g.slots || [];
    const occupied = slots.filter(s => s.user_id).length;
    const confirmed = slots.filter(s => s.status === "confirmed").length;

    const grid = slots.length
      ? `<div class="slots-grid">${slots.map(s => slotHtml(g.id, s)).join("")}</div>`
      : `<div class="no-slots">Для этой игры не указано число слотов</div>`;

    return `
      <div class="game-card">
        <div class="game-top">
          <div class="game-when">📅 ${g.date} · 🕐 ${g.time}</div>
          ${g.price ? `<div class="game-price">${g.price}</div>` : ""}
        </div>
        <div class="game-loc">📍 ${g.location}</div>
        ${g.extra_info ? `<div class="game-extra">ℹ️ ${g.extra_info}</div>` : ""}
        <div class="game-count">👥 ${confirmed}/${slots.length} подтверждено, ${occupied} занято всего</div>
        ${grid}
      </div>`;
  }).join("");
}

async function loadGames() {
  try {
    const r = await fetch(`/api/games?user_id=${userId || ""}`).then(r => r.json());
    renderGames(r.games);
  } catch (e) {
    showError("Не удалось загрузить игры. Попробуй ещё раз.");
  }
}

async function claimSlot(gameId, slotIndex) {
  if (!userId) {
    showError("Не удалось определить тебя. Открой игры заново через бота.");
    return;
  }
  try {
    const res = await fetch("/api/games/claim-slot", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId, game_id: gameId, slot_index: slotIndex })
    }).then(r => r.json());
    if (!res.ok) {
      showError(res.error || "Не удалось занять слот.");
    } else {
      document.getElementById("error-banner").innerHTML = "";
    }
    loadGames();
  } catch (e) {
    showError("Ошибка сети — попробуй ещё раз.");
  }
}

async function releaseSlot(gameId, slotIndex) {
  try {
    const res = await fetch("/api/games/release-slot", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId, game_id: gameId, slot_index: slotIndex })
    }).then(r => r.json());
    if (!res.ok) {
      showError(res.error || "Не удалось освободить слот.");
    } else {
      document.getElementById("error-banner").innerHTML = "";
    }
    loadGames();
  } catch (e) {
    showError("Ошибка сети — попробуй ещё раз.");
  }
}

loadGames();
setInterval(loadGames, 4000);
</script>
</body>
</html>
