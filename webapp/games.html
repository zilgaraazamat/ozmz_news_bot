<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Игры — OZMZ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif;background:#0e1a12;color:#f5f5f0;min-height:100%;padding:24px 16px 60px;-webkit-hyphens:none;hyphens:none;overflow-y:auto;-webkit-overflow-scrolling:touch}
.wrap{width:100%;max-width:440px;margin:0 auto}
.head{text-align:center;margin-bottom:20px}
.head h1{font-size:20px;font-weight:900}
.head p{font-size:13px;color:#6b7c6e;margin-top:4px}
.hidden{display:none!important}
.empty{text-align:center;color:#6b7c6e;font-size:14px;padding:40px 10px}
.game-card{background:#1e3024;border:1px solid rgba(126,217,87,.18);border-radius:18px;padding:18px;margin-bottom:16px}
.game-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.game-when{font-size:16px;font-weight:800}
.game-price{font-size:13px;font-weight:700;color:#7ed957;background:rgba(126,217,87,.12);padding:4px 10px;border-radius:8px;white-space:nowrap}
.game-loc{font-size:13px;color:#9db3a3;margin-bottom:6px}
.game-extra{font-size:12px;color:#6b7c6e;margin-bottom:10px;line-height:1.4}
.game-count{font-size:12px;color:#6b7c6e;margin-bottom:12px}
.roster{background:rgba(255,255,255,.03);border-radius:12px;padding:10px 12px;margin-bottom:12px}
.roster-title{font-size:11px;color:#6b7c6e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.roster-row{display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0}
.roster-row .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.confirmed{background:#7ed957}
.dot.pending{background:#e0b84a}
.roster-empty{font-size:12px;color:#4a5a4d}
.guests-label{font-size:12px;color:#6b7c6e;display:block;margin-bottom:6px}
.guests-input{width:100%;padding:11px 14px;border-radius:10px;border:1px solid rgba(126,217,87,.25);background:#0e1a12;color:#f5f5f0;font-size:16px;margin-bottom:10px}
.guests-input:focus{outline:none;border-color:#7ed957}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-weight:800;font-size:14px;cursor:pointer;background:#7ed957;color:#0e1a12;transition:transform .15s}
.btn:active{transform:scale(.97)}
.btn[disabled]{opacity:.5;pointer-events:none}
.status-badge{width:100%;text-align:center;padding:12px;border-radius:12px;font-size:13px;font-weight:700}
.status-pending{background:rgba(224,184,74,.15);color:#e0b84a;border:1px solid rgba(224,184,74,.35)}
.status-confirmed{background:rgba(126,217,87,.15);color:#7ed957;border:1px solid rgba(126,217,87,.35)}
.error-banner{background:rgba(255,80,80,.12);border:1px solid rgba(255,80,80,.35);color:#ff8080;font-size:12px;padding:10px 12px;border-radius:10px;margin-bottom:12px;text-align:center}
.team-block{background:rgba(255,255,255,.04);border-radius:10px;padding:10px 12px;margin-top:8px}
.team-title{font-size:12px;font-weight:800;color:#7ed957;margin-bottom:6px}
.team-player{font-size:12px;padding:3px 0}
.teams-title{font-size:11px;color:#6b7c6e;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px}
.filters{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
.filter-chip{flex-shrink:0;padding:8px 14px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#9db3a3;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.filter-chip.active{background:rgba(126,217,87,.15);border-color:#7ed957;color:#7ed957}
.btn-cancel{width:100%;padding:9px;margin-top:8px;border:1px solid rgba(255,80,80,.35);background:transparent;color:#ff8080;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer}
.switch-team-block{margin-top:10px;padding-top:10px;border-top:1px dashed rgba(255,255,255,.08)}
.btn-switch{width:100%;padding:9px;margin-top:6px;border:1px solid rgba(126,217,87,.35);background:transparent;color:#7ed957;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer}
.chat-toggle{width:100%;padding:10px;margin-top:10px;border:1px solid rgba(126,217,87,.3);background:transparent;color:#7ed957;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer}
.chat-box{margin-top:10px;background:rgba(255,255,255,.03);border-radius:12px;padding:10px 12px}
.chat-messages{max-height:220px;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:8px}
.chat-msg{font-size:12px;line-height:1.4}
.chat-msg .who{font-weight:700;color:#7ed957;margin-right:4px}
.chat-msg.mine .who{color:#e0b84a}
.chat-empty{font-size:12px;color:#4a5a4d;text-align:center;padding:8px 0}
.chat-input-row{display:flex;gap:8px}
.chat-input{flex:1;padding:9px 12px;border-radius:9px;border:1px solid rgba(126,217,87,.25);background:#0e1a12;color:#f5f5f0;font-size:14px}
.chat-input:focus{outline:none;border-color:#7ed957}
.chat-send-btn{padding:9px 14px;border:none;border-radius:9px;background:#7ed957;color:#0e1a12;font-weight:800;font-size:13px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>⚽ Игры</h1>
    <p>Записывайся и приходи играть</p>
  </div>
  <div id="error-banner"></div>
  <div class="filters" id="filters"></div>
  <div id="games-list"></div>
</div>

<script>
let userId = new URLSearchParams(location.search).get("uid");

if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  if (!userId) {
    const tgUser = Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user;
    if (tgUser && tgUser.id) userId = String(tgUser.id);
  }
  Telegram.WebApp.BackButton.show();
  Telegram.WebApp.BackButton.onClick(() => { location.href = "/app" + (userId ? ("?uid=" + userId) : ""); });
}

function showError(msg) {
  document.getElementById("error-banner").innerHTML = `<div class="error-banner">⚠️ ${msg}</div>`;
}

const WEEKDAYS = ["вс","пн","вт","ср","чт","пт","сб"];
const MONTHS = ["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"];

function parseGameDate(g) {
  // ожидаем ISO "YYYY-MM-DD"; для старых игр с другим форматом — null (не участвуют в фильтрах)
  if (!g.date || !/^\d{4}-\d{2}-\d{2}$/.test(g.date)) return null;
  const [y, m, d] = g.date.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function formatDate(g) {
  const dt = parseGameDate(g);
  if (!dt) return g.date || "";
  const today = new Date(); today.setHours(0,0,0,0);
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
  const diffDays = Math.round((dt - today) / 86400000);
  if (diffDays === 0) return `Сегодня, ${dt.getDate()} ${MONTHS[dt.getMonth()]}`;
  if (diffDays === 1) return `Завтра, ${dt.getDate()} ${MONTHS[dt.getMonth()]}`;
  return `${dt.getDate()} ${MONTHS[dt.getMonth()]}, ${WEEKDAYS[dt.getDay()]}`;
}

let currentFilter = "all";

function matchesFilter(g) {
  if (currentFilter === "all") return true;
  const dt = parseGameDate(g);
  if (!dt) return currentFilter === "all";
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = Math.round((dt - today) / 86400000);
  if (currentFilter === "today") return diffDays === 0;
  if (currentFilter === "tomorrow") return diffDays === 1;
  if (currentFilter === "week") return diffDays >= 0 && diffDays <= 7;
  return true;
}

function renderFilters() {
  const filters = [
    { id: "all", label: "Все ближайшие" },
    { id: "today", label: "Сегодня" },
    { id: "tomorrow", label: "Завтра" },
    { id: "week", label: "На неделе" },
  ];
  document.getElementById("filters").innerHTML = filters.map(f => `
    <div class="filter-chip ${currentFilter === f.id ? "active" : ""}" onclick="setFilter('${f.id}')">${f.label}</div>
  `).join("");
}

function setFilter(id) {
  currentFilter = id;
  renderFilters();
  renderGames(window.__lastGames || []);
}

function myTeamPref(g) {
  const mine = (g.signups || []).find(s => s.user_id === userId);
  return mine && mine.team_pref !== null && mine.team_pref !== undefined ? mine.team_pref : null;
}

function teamOptions(g, currentPref) {
  const fill = g.team_fill || [];
  let html = `<option value="">Без разницы</option>`;
  for (let i = 0; i < (g.num_teams || 0); i++) {
    const f = fill.find(x => x.index === i);
    const occupied = f ? f.occupied : 0;
    const capacity = f ? f.capacity : null;
    const isMine = currentPref === i;
    const full = capacity && !isMine && occupied >= capacity;
    const countLabel = capacity ? ` (${occupied}/${capacity})` : "";
    html += `<option value="${i}" ${full ? "disabled" : ""}>${full ? "🔒 " : ""}Команда ${i + 1}${countLabel}${full ? " — нет мест" : ""}</option>`;
  }
  return html;
}

function rosterHtml(signups) {
  if (!signups || signups.length === 0) {
    return `<div class="roster-empty">Пока никто не записался</div>`;
  }
  return signups.map(s => {
    const cls = s.status === "confirmed" ? "confirmed" : "pending";
    const label = s.player ? ` (${s.player})` : "";
    const guests = s.guests_count > 0 ? ` +${s.guests_count}` : "";
    const pref = (s.team_pref !== null && s.team_pref !== undefined) ? ` · хочет в Команду ${s.team_pref + 1}` : "";
    return `<div class="roster-row"><span class="dot ${cls}"></span><span>${s.name}${label}${guests}${pref}</span></div>`;
  }).join("");
}

function teamsHtml(teams) {
  if (!teams || teams.length === 0) return "";
  const byTeam = {};
  teams.forEach(m => {
    (byTeam[m.team_index] = byTeam[m.team_index] || []).push(m);
  });
  const indices = Object.keys(byTeam).map(Number).sort((a, b) => a - b);
  return `<div class="teams-title">Составы команд</div>` + indices.map(i => `
    <div class="team-block">
      <div class="team-title">Команда ${i + 1} (${byTeam[i].length})</div>
      ${byTeam[i].map(p => `<div class="team-player">${p.name}${p.player ? ` — <i>${p.player}</i>` : ""}</div>`).join("")}
    </div>`).join("");
}

function totalPeople(signups, statusFilter) {
  return (signups || [])
    .filter(s => !statusFilter || s.status === statusFilter)
    .reduce((sum, s) => sum + 1 + (s.guests_count || 0), 0);
}

function renderGames(games) {
  window.__lastGames = games || [];
  const el = document.getElementById("games-list");
  const filtered = (games || []).filter(matchesFilter);

  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty">Игр пока нет ⚽<br>Загляни позже или смени фильтр!</div>`;
    return;
  }

  el.innerHTML = filtered.map(g => {
    const confirmedCount = totalPeople(g.signups, "confirmed");
    const totalCount = totalPeople(g.signups, null);
    const myPref = myTeamPref(g);

    let actionHtml;
    if (g.my_status === "confirmed" || g.my_status === "pending") {
      const statusLine = g.my_status === "confirmed"
        ? `<div class="status-badge status-confirmed">✅ Ты записан и подтверждён</div>`
        : `<div class="status-badge status-pending">⏳ Ожидает подтверждения оплаты</div>
           <button class="btn-cancel" onclick="cancelSignup(${g.id})">Отменить запись</button>`;

      const switchBlock = (g.num_teams && g.num_teams > 1)
        ? `<div class="switch-team-block">
             <label class="guests-label">${myPref !== null ? `Сейчас: Команда ${myPref + 1}. ` : ""}Сменить команду:</label>
             <select class="guests-input" id="switch-teampref-${g.id}">${teamOptions(g, myPref)}</select>
             <button class="btn-switch" onclick="changeTeam(${g.id})">Сменить</button>
           </div>`
        : "";

      actionHtml = statusLine + switchBlock;
    } else {
      const teamChoice = (g.num_teams && g.num_teams > 1)
        ? `<label class="guests-label">В какой команде хочешь быть?</label>
           <select class="guests-input" id="teampref-${g.id}">${teamOptions(g, null)}</select>`
        : "";
      actionHtml = `
        <label class="guests-label">Сколько вас всего придёт (с тобой)?</label>
        <input type="number" class="guests-input" id="guests-${g.id}" min="1" max="20" value="1">
        ${teamChoice}
        <button class="btn" onclick="signup(${g.id})">Записаться</button>`;
    }

    return `
      <div class="game-card">
        <div class="game-top">
          <div class="game-when">📅 ${formatDate(g)} · 🕐 ${g.time}</div>
          ${g.price ? `<div class="game-price">${g.price}</div>` : ""}
        </div>
        <div class="game-loc">📍 ${g.location}</div>
        ${g.extra_info ? `<div class="game-extra">ℹ️ ${g.extra_info}</div>` : ""}
        <div class="game-count">👥 ${confirmedCount}/${g.num_players || "?"} подтверждено${totalCount > confirmedCount ? `, ещё ${totalCount - confirmedCount} ожидает` : ""}</div>
        <div class="roster">
          <div class="roster-title">Записались</div>
          ${rosterHtml(g.signups)}
        </div>
        ${actionHtml}
        ${teamsHtml(g.teams)}
        ${g.my_status ? `
          <button class="chat-toggle" onclick="toggleChat(${g.id})" id="chat-toggle-${g.id}">💬 Чат участников</button>
          <div class="chat-box hidden" id="chat-box-${g.id}">
            <div class="chat-messages" id="chat-messages-${g.id}"></div>
            <div class="chat-input-row">
              <input class="chat-input" id="chat-input-${g.id}" placeholder="Написать..." maxlength="500">
              <button class="chat-send-btn" onclick="sendChatMessage(${g.id})">➤</button>
            </div>
          </div>` : ""}
      </div>`;
  }).join("");
}

async function loadGames() {
  try {
    const r = await fetch(`/api/games?user_id=${userId || ""}`).then(r => r.json());
    renderGames(r.games);
  } catch (e) {
    showError("Не удалось загрузить игры. Попробуй ещё раз.");
  }
}

async function signup(gameId) {
  if (!userId) {
    showError("Не удалось определить тебя. Открой игры заново через бота.");
    return;
  }
  const guestsInput = document.getElementById(`guests-${gameId}`);
  const totalPeopleCount = guestsInput ? parseInt(guestsInput.value, 10) || 1 : 1;
  const guestsCount = Math.max(0, totalPeopleCount - 1);

  const teamPrefSelect = document.getElementById(`teampref-${gameId}`);
  const teamPref = (teamPrefSelect && teamPrefSelect.value !== "") ? parseInt(teamPrefSelect.value, 10) : null;

  try {
    const res = await fetch("/api/games/signup", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId, game_id: gameId, guests_count: guestsCount, team_pref: teamPref })
    }).then(r => r.json());
    if (!res.ok) {
      showError(res.error || "Не удалось записаться.");
    } else {
      document.getElementById("error-banner").innerHTML = "";
      loadGames();
    }
  } catch (e) {
    showError("Ошибка сети — попробуй ещё раз.");
  }
}

let openChats = {};       // gameId -> true/false
let chatPollTimers = {};  // gameId -> intervalId
let chatMessages = {};    // gameId -> [messages]

function renderChatMessages(gameId) {
  const el = document.getElementById(`chat-messages-${gameId}`);
  if (!el) return;
  const msgs = chatMessages[gameId] || [];
  if (msgs.length === 0) {
    el.innerHTML = `<div class="chat-empty">Пока тишина — напиши первым</div>`;
  } else {
    const wasAtBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 10;
    el.innerHTML = msgs.map(m => {
      const mine = m.user_id === userId ? " mine" : "";
      return `<div class="chat-msg${mine}"><span class="who">${m.name}:</span>${m.text}</div>`;
    }).join("");
    if (wasAtBottom || msgs.length <= 20) el.scrollTop = el.scrollHeight;
  }
}

async function pollChat(gameId) {
  if (!userId) return;
  try {
    const r = await fetch(`/api/games/chat?user_id=${userId}&game_id=${gameId}&since_id=0`).then(r => r.json());
    if (r.messages) {
      chatMessages[gameId] = r.messages;
      renderChatMessages(gameId);
    }
  } catch (e) {}
}

function toggleChat(gameId) {
  const box = document.getElementById(`chat-box-${gameId}`);
  const btn = document.getElementById(`chat-toggle-${gameId}`);
  if (openChats[gameId]) {
    box.classList.add("hidden");
    openChats[gameId] = false;
    btn.textContent = "💬 Чат участников";
    clearInterval(chatPollTimers[gameId]);
  } else {
    box.classList.remove("hidden");
    openChats[gameId] = true;
    btn.textContent = "🔼 Скрыть чат";
    pollChat(gameId);
    chatPollTimers[gameId] = setInterval(() => pollChat(gameId), 3000);
  }
}

async function sendChatMessage(gameId) {
  const input = document.getElementById(`chat-input-${gameId}`);
  const text = input.value.trim();
  if (!text || !userId) return;
  input.value = "";
  try {
    const res = await fetch("/api/games/chat/send", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId, game_id: gameId, text })
    }).then(r => r.json());
    if (res.ok) pollChat(gameId);
    else showError(res.error || "Не удалось отправить сообщение.");
  } catch (e) {
    showError("Ошибка сети — попробуй ещё раз.");
  }
}

async function changeTeam(gameId) {
  const select = document.getElementById(`switch-teampref-${gameId}`);
  const val = select.value;
  const teamPref = val === "" ? null : parseInt(val, 10);
  try {
    const res = await fetch("/api/games/change-team", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId, game_id: gameId, team_pref: teamPref })
    }).then(r => r.json());
    if (!res.ok) {
      showError(res.error || "Не удалось сменить команду.");
    } else {
      document.getElementById("error-banner").innerHTML = "";
      loadGames();
    }
  } catch (e) {
    showError("Ошибка сети — попробуй ещё раз.");
  }
}

async function cancelSignup(gameId) {
  if (!userId) return;
  try {
    const res = await fetch("/api/games/cancel-signup", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId, game_id: gameId })
    }).then(r => r.json());
    if (res.ok) {
      document.getElementById("error-banner").innerHTML = "";
      loadGames();
    } else {
      showError(res.error || "Не удалось отменить запись.");
    }
  } catch (e) {
    showError("Ошибка сети — попробуй ещё раз.");
  }
}

renderFilters();
loadGames();
setInterval(() => {
  const anyChatOpen = Object.values(openChats).some(v => v);
  if (!anyChatOpen) loadGames();
}, 4000);
</script>
</body>
</html>
